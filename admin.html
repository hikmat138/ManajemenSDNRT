<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - SDN Ranca Tales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .sidebar-link.active { background-color: #eff6ff; color: #2563eb; border-right: 4px solid #2563eb; }
        .submenu-link { padding-left: 3rem; font-size: 0.85rem; color: #64748b; transition: all 0.2s; cursor: pointer; display: block; padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .submenu-link:hover { color: #2563eb; background-color: #f8fafc; }
        .hidden { display: none; }
        .overflow-x-auto::-webkit-scrollbar { height: 6px; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-72 bg-white border-r border-gray-200 flex flex-col overflow-y-auto">
            <div class="p-6">
                <h1 class="text-xl font-bold text-blue-600 uppercase">SDN RANCA TALES</h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1">Digitalisasi Sekolah</p>
            </div>
            
            <nav class="flex-1 px-4 space-y-1">
                <a href="#" onclick="showSection('dashboard')" class="sidebar-link active flex items-center p-3 rounded-lg hover:bg-gray-50 transition">
                    <i class="fas fa-home mr-3 w-5"></i> Dashboard
                </a>

                <div>
                    <button onclick="toggleSubmenu('sub-murid')" class="w-full sidebar-link flex items-center justify-between p-3 rounded-lg hover:bg-gray-50 transition">
                        <span class="flex items-center"><i class="fas fa-user-graduate mr-3 w-5"></i> Data Murid</span>
                        <i class="fas fa-chevron-down text-[10px]"></i>
                    </button>
                    <div id="sub-murid" class="hidden space-y-1 mt-1">
                        <div onclick="showSection('siswa-pribadi')" class="submenu-link">Data Pribadi</div>
                        <div onclick="showSection('siswa-keluarga')" class="submenu-link">Data Keluarga</div>
                        <div onclick="showSection('siswa-alamat')" class="submenu-link">Data Alamat</div>
                        <div onclick="showSection('siswa-keadaan')" class="submenu-link">Data Keadaan</div>
                        <div onclick="showSection('siswa-mutasi-masuk')" class="submenu-link">Mutasi Masuk</div>
                        <div onclick="showSection('siswa-mutasi-keluar')" class="submenu-link">Mutasi Keluar</div>
                    </div>
                </div>

                <a href="#" onclick="showSection('ketenagaan')" class="sidebar-link flex items-center p-3 rounded-lg hover:bg-gray-50 transition">
                    <i class="fas fa-chalkboard-teacher mr-3 w-5"></i> Ketenagaan
                </a>
            </nav>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-10">
                <h2 id="section-title" class="font-bold text-gray-700 uppercase">Dashboard Utama</h2>
                <div class="flex items-center space-x-3">
                    <div class="text-right">
                        <p class="text-sm font-bold uppercase italic">HIKMATULLAH</p>
                        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">Administrator Sekolah</p>
                    </div>
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">H</div>
                </div>
            </header>

            <div class="p-6">
                <!-- Dashboard Section -->
                <div id="section-dashboard" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <p class="text-xs text-gray-500 font-bold uppercase">Jumlah Murid</p>
                        <h4 id="stat-murid" class="text-2xl font-bold text-blue-600">0</h4>
                    </div>
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <p class="text-xs text-gray-500 font-bold uppercase">Jumlah Guru</p>
                        <h4 id="stat-guru" class="text-2xl font-bold text-green-600">0</h4>
                    </div>
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <p class="text-xs text-gray-500 font-bold uppercase">Jumlah Tendik</p>
                        <h4 id="stat-tendik" class="text-2xl font-bold text-orange-600">0</h4>
                    </div>
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <p class="text-xs text-gray-500 font-bold uppercase">Mutasi Masuk</p>
                        <h4 id="stat-masuk" class="text-2xl font-bold text-indigo-600">0</h4>
                    </div>
                    <div class="bg-white p-4 rounded-xl border shadow-sm">
                        <p class="text-xs text-gray-500 font-bold uppercase">Mutasi Keluar</p>
                        <h4 id="stat-keluar" class="text-2xl font-bold text-red-600">0</h4>
                    </div>
                </div>

                <!-- Table Section Container -->
                <div id="section-siswa-container" class="hidden space-y-4 mt-6">
                    <div class="flex flex-wrap gap-4 justify-between items-center bg-white p-4 rounded-xl border shadow-sm">
                        <h3 id="siswa-table-title" class="font-bold text-blue-600 uppercase text-sm">DATA</h3>
                        <div class="flex gap-2">
                            <select id="filter-kelas" onchange="resetAndFilter()" class="border p-2 rounded-lg text-sm outline-none bg-gray-50">
                                <option value="">Semua Kelas</option>
                                <option value="1A">1A</option><option value="1B">1B</option>
                                <option value="2A">2A</option><option value="2B">2B</option>
                                <option value="3A">3A</option><option value="3B">3B</option>
                                <option value="4A">4A</option><option value="4B">4B</option>
                                <option value="5A">5A</option><option value="5B">5B</option>
                                <option value="6A">6A</option><option value="6B">6B</option>
                            </select>
                            <input type="text" id="search-siswa" onkeyup="resetAndFilter()" placeholder="Cari Nama..." class="border p-2 rounded-lg text-sm outline-none w-64 bg-gray-50">
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-[11px] text-left border-collapse">
                                <thead id="table-siswa-head" class="bg-gray-100 border-b text-gray-600 uppercase font-bold"></thead>
                                <tbody id="table-siswa-body" class="divide-y divide-gray-100 text-gray-700"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbweLDASRb8-AbSrlD83kE3GsWBuQdPB0W0uqTW9BMBxrCsCtugADV0O9DFSQjhL0wwPIw/exec";
        let masterSiswa = [];
        let filteredSiswa = [];
        let currentSiswaSubMenu = 'siswa-pribadi';

        const colMap = {
            'nama': 'Nama Murid', 'kelas': 'Kelas', 'nis': 'NIS', 'nisn': 'NISN', 'nik': 'NIK', 'jk': 'L/P',
            'tmpt_lahir': 'Tempat Lahir', 'tgl_lahir': 'Tanggal Lahir', 'nomor_kk': 'Nomor KK', 'jumlah_saudara': 'Jml Saudara',
            'lintang': 'Lintang', 'bujur': 'Bujur', 'status_aktif': 'Status', 'tgl_masuk': 'Tgl Masuk', 'tgl_keluar': 'Tgl Keluar',
            'alasan': 'Alasan', 'alamat': 'Alamat', 'rt': 'RT', 'rw': 'RW'
        };

        function formatTanggalIndo(dateStr) {
            if (!dateStr || dateStr === '-') return '-';
            let date = dateStr.includes('T') || dateStr.includes('-') ? new Date(dateStr) : null;
            if (!date || isNaN(date.getTime())) {
                const parts = dateStr.split('/');
                if (parts.length === 3) date = new Date(parts[2], parts[0] - 1, parts[1]);
            }
            if (date instanceof Date && !isNaN(date)) {
                const bulanIndo = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                return `${date.getDate()} ${bulanIndo[date.getMonth()]} ${date.getFullYear()}`;
            }
            return dateStr;
        }

        async function loadData() {
            try {
                const res = await fetch(`${API_URL}?action=getAllData`);
                const result = await res.json();
                if (result.status === "success") {
                    masterSiswa = result.data.siswa || [];
                    // Update Dashboard Stats
                    document.getElementById('stat-murid').innerText = masterSiswa.filter(s => s.status_aktif === 'Aktif').length;
                    document.getElementById('stat-masuk').innerText = masterSiswa.filter(s => s.tgl_masuk && s.tgl_masuk !== '-').length;
                    document.getElementById('stat-keluar').innerText = masterSiswa.filter(s => s.tgl_keluar && s.tgl_keluar !== '-').length;
                    filterSiswa();
                }
            } catch (e) { console.error(e); }
        }

        function filterSiswa() {
            const keyword = document.getElementById('search-siswa').value.toLowerCase();
            const kls = document.getElementById('filter-kelas').value;
            filteredSiswa = masterSiswa.filter(s => {
                const matchNama = (s.nama || "").toLowerCase().includes(keyword);
                const matchKelas = kls === "" || (s.kelas || "").toString() === kls;
                
                // Logika Filter Tab Mutasi
                if (currentSiswaSubMenu === 'siswa-mutasi-masuk') return matchNama && matchKelas && s.tgl_masuk && s.tgl_masuk !== '-';
                if (currentSiswaSubMenu === 'siswa-mutasi-keluar') return matchNama && matchKelas && s.tgl_keluar && s.tgl_keluar !== '-';
                
                return matchNama && matchKelas;
            });
            renderTableSiswa(filteredSiswa);
        }

        function renderTableSiswa(list) {
            const thead = document.getElementById('table-siswa-head');
            const tbody = document.getElementById('table-siswa-body');
            let cols = [];
            
            switch(currentSiswaSubMenu) {
                case 'siswa-pribadi': cols = ['nama', 'kelas', 'nis', 'nisn', 'jk', 'tmpt_lahir', 'tgl_lahir', 'status_aktif']; break;
                case 'siswa-keluarga': cols = ['nama', 'kelas', 'nomor_kk', 'jumlah_saudara', 'status_aktif']; break;
                case 'siswa-alamat': cols = ['nama', 'kelas', 'alamat', 'rt', 'rw', 'lintang', 'bujur', 'status_aktif']; break;
                case 'siswa-mutasi-masuk': cols = ['nama', 'kelas', 'tgl_masuk', 'alasan', 'status_aktif']; break;
                case 'siswa-mutasi-keluar': cols = ['nama', 'kelas', 'tgl_keluar', 'alasan', 'status_aktif']; break;
                default: cols = ['nama', 'kelas', 'status_aktif'];
            }

            thead.innerHTML = `<tr>${cols.map(c => `<th class="p-3 border-r whitespace-nowrap">${colMap[c] || c}</th>`).join('')}</tr>`;
            tbody.innerHTML = list.map(s => `
                <tr class="hover:bg-blue-50 border-b">
                    ${cols.map(c => {
                        let val = s[c] || '-';
                        if (['tgl_lahir', 'tgl_masuk', 'tgl_keluar'].includes(c)) val = formatTanggalIndo(val);
                        const color = c === 'status_aktif' && val === 'Aktif' ? 'text-green-600 font-bold' : '';
                        return `<td class="p-3 border-r whitespace-nowrap ${color}">${val}</td>`;
                    }).join('')}
                </tr>
            `).join('');
        }

        function showSection(id) {
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            if (id === 'dashboard') {
                document.getElementById('section-dashboard').classList.remove('hidden');
                document.getElementById('section-siswa-container').classList.add('hidden');
            } else {
                document.getElementById('section-dashboard').classList.add('hidden');
                document.getElementById('section-siswa-container').classList.remove('hidden');
                currentSiswaSubMenu = id;
                filterSiswa();
            }
            document.getElementById('section-title').innerText = id.replace(/-/g, ' ').toUpperCase();
        }

        function toggleSubmenu(id) { document.getElementById(id).classList.toggle('hidden'); }
        function resetAndFilter() { filterSiswa(); }
        window.onload = loadData;
    </script>
</body>
</html>
