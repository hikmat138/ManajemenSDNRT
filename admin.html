<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - SDN Ranca Tales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .sidebar-link.active { background-color: #eff6ff; color: #2563eb; border-right: 4px solid #2563eb; }
        .submenu-link { padding-left: 3rem; font-size: 0.85rem; color: #64748b; transition: all 0.2s; cursor: pointer; }
        .submenu-link:hover { color: #2563eb; background-color: #f8fafc; }
        .hidden { display: none; }
        .overflow-x-auto::-webkit-scrollbar { height: 6px; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-72 bg-white border-r border-gray-200 flex flex-col overflow-y-auto">
            <div class="p-6">
                <h1 class="text-xl font-bold text-blue-600 uppercase">SDN RANCA TALES</h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1">Digitalisasi Sekolah</p>
            </div>
            
            <nav class="flex-1 px-4 space-y-1">
                <a href="#" onclick="showSection('dashboard')" class="sidebar-link active flex items-center p-3 rounded-lg hover:bg-gray-50 transition">
                    <i class="fas fa-home mr-3 w-5"></i> Dashboard
                </a>

                <div>
                    <button onclick="toggleSubmenu('sub-murid')" class="w-full sidebar-link flex items-center justify-between p-3 rounded-lg hover:bg-gray-50 transition">
                        <span class="flex items-center"><i class="fas fa-user-graduate mr-3 w-5"></i> Data Murid</span>
                        <i class="fas fa-chevron-down text-[10px]"></i>
                    </button>
                    <div id="sub-murid" class="hidden space-y-1 mt-1">
                        <div onclick="showSection('siswa-pribadi')" class="submenu-link block py-2 rounded-md">Data Pribadi</div>
                        <div onclick="showSection('siswa-keluarga')" class="submenu-link block py-2 rounded-md">Data Keluarga</div>
                        <div onclick="showSection('siswa-ortu')" class="submenu-link block py-2 rounded-md">Data Orang Tua</div>
                        <div onclick="showSection('siswa-alamat')" class="submenu-link block py-2 rounded-md">Data Alamat</div>
                        <div onclick="showSection('siswa-keadaan')" class="submenu-link block py-2 rounded-md">Data Keadaan</div>
                        <div onclick="showSection('siswa-periodik')" class="submenu-link block py-2 rounded-md">Data Periodik</div>
                        <div onclick="showSection('siswa-kontak')" class="submenu-link block py-2 rounded-md">Data Kontak</div>
                    </div>
                </div>

                <a href="#" onclick="showSection('ketenagaan')" class="sidebar-link flex items-center p-3 rounded-lg hover:bg-gray-50 transition">
                    <i class="fas fa-chalkboard-teacher mr-3 w-5"></i> Ketenagaan
                </a>
            </nav>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-10">
                <h2 id="section-title" class="font-bold text-gray-700 uppercase">Dashboard Utama</h2>
                <div class="flex items-center space-x-3">
                    <div class="text-right">
                        <p class="text-sm font-bold uppercase italic">HIKMATULLAH</p>
                        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">Administrator Sekolah</p>
                    </div>
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">H</div>
                </div>
            </header>

            <div class="p-6">
                <!-- Section Data Murid Container -->
                <div id="section-siswa-container" class="hidden space-y-4">
                    <div class="flex flex-wrap gap-4 justify-between items-center bg-white p-4 rounded-xl border shadow-sm">
                        <h3 id="siswa-table-title" class="font-bold text-blue-600 uppercase text-sm">DATA MURID</h3>
                        <div class="flex gap-2">
                            <select id="filter-kelas" onchange="resetAndFilter()" class="border p-2 rounded-lg text-sm outline-none bg-gray-50">
                                <option value="">Semua Kelas</option>
                                <option value="1A">1A</option><option value="1B">1B</option>
                                <option value="2A">2A</option><option value="2B">2B</option>
                                <option value="3A">3A</option><option value="3B">3B</option>
                                <option value="4A">4A</option><option value="4B">4B</option>
                                <option value="5A">5A</option><option value="5B">5B</option>
                                <option value="6A">6A</option><option value="6B">6B</option>
                            </select>
                            <input type="text" id="search-siswa" onkeyup="resetAndFilter()" placeholder="Cari Nama Murid..." class="border p-2 rounded-lg text-sm outline-none w-64 bg-gray-50">
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-[11px] text-left border-collapse">
                                <thead id="table-siswa-head" class="bg-gray-100 border-b text-gray-600 uppercase font-bold"></thead>
                                <tbody id="table-siswa-body" class="divide-y divide-gray-100 text-gray-700"></tbody>
                            </table>
                        </div>
                        <div class="p-4 border-t bg-gray-50 flex justify-between items-center">
                            <div id="pagination-info" class="text-xs text-gray-500"></div>
                            <div class="flex gap-1">
                                <button onclick="prevPage()" class="p-2 hover:bg-gray-200 rounded-lg"><i class="fas fa-chevron-left text-xs"></i></button>
                                <button onclick="nextPage()" class="p-2 hover:bg-gray-200 rounded-lg"><i class="fas fa-chevron-right text-xs"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbweLDASRb8-AbSrlD83kE3GsWBuQdPB0W0uqTW9BMBxrCsCtugADV0O9DFSQjhL0wwPIw/exec";
        
        let masterSiswa = [];
        let filteredSiswa = [];
        let currentPage = 1;
        let rowsPerPage = 15;
        let currentSiswaSubMenu = 'siswa-pribadi';

        // Mapping Kolom Berdasarkan Kebutuhan Bapak
        const colMap = {
            'nama': 'Nama Murid', 'kelas': 'Kls', 'nis': 'NIS', 'nisn': 'NISN', 'nik': 'NIK', 'jk': 'L/P',
            'tmpt_lahir': 'Tempat Lahir', 'tgl_lahir': 'Tgl Lahir', 'agama': 'Agama', 'akte': 'No. Akte',
            'disabilitas': 'Kebutuhan Khusus', 'nomor_kk': 'No. KK', 'anak_ke': 'Anak Ke', 'jumlah_saudara': 'Saudara',
            'jns_tinggal': 'Jenis Tinggal', 'transportasi': 'Transportasi', 'jarak': 'Jarak', 'status_aktif': 'Status',
            'kip': 'KIP', 'kps': 'KPS', 'pip': 'Layak PIP', 'no_kip': 'No KIP', 'nama_kip': 'Nama KIP', 'kks': 'KKS', 'alasan_pip': 'Alasan PIP',
            'ayah_nama': 'Ayah', 'ibu_nama': 'Ibu', 'wali_nama': 'Wali',
            'alamat': 'Alamat', 'rt': 'RT', 'rw': 'RW', 'kelurahan': 'Kelurahan', 'kecamatan': 'Kecamatan', 'kodepos': 'Kodepos',
            'lintang': 'Lintang', 'bujur': 'Bujur', 'berat_badan': 'BB', 'tinggi_badan': 'TB', 'lingkar_kepala': 'Lingkar Kepala',
            'hobi': 'Hobi', 'cita_cita': 'Cita-cita', 'sekolah_asal': 'Sekolah Asal', 'hp': 'No HP', 'telp': 'Telp', 'email': 'Email'
        };
// Fungsi konversi m/dd/yyyy -> d mmmm yyyy
function formatTanggalIndo(dateStr) {
    if (!dateStr || dateStr === '-') return '-';
    
    // Pecah data berdasarkan "/" (asumsi format m/d/yyyy)
    const parts = dateStr.split('/');
    if (parts.length !== 3) return dateStr; 

    const bulanIndo = [
        "Januari", "Februari", "Maret", "April", "Mei", "Juni",
        "Juli", "Agustus", "September", "Oktober", "November", "Desember"
    ];

    // dateStr m/d/yyyy -> parts[0]=bulan, parts[1]=tanggal, parts[2]=tahun
    const bln = bulanIndo[parseInt(parts[0]) - 1];
    const tgl = parts[1];
    const thn = parts[2];

    return `${tgl} ${bln} ${thn}`;
}
        async function loadData() {
            try {
                const res = await fetch(`${API_URL}?action=getAllData`);
                const result = await res.json();
                if (result.status === "success") {
                    masterSiswa = result.data.siswa || [];
                    filterSiswa();
                }
            } catch (e) { console.error("Error load data:", e); }
        }

        function filterSiswa() {
            const keyword = document.getElementById('search-siswa').value.toLowerCase();
            const kls = document.getElementById('filter-kelas').value;
            
            filteredSiswa = masterSiswa.filter(s => {
                const matchNama = (s.nama || "").toLowerCase().includes(keyword);
                // Filter kelas menggunakan kolom BC (property 'kelas')
                const matchKelas = kls === "" || (s.kelas || "").toString() === kls;
                return matchNama && matchKelas;
            });
            updatePagination();
        }

        function updatePagination() {
            const start = (currentPage - 1) * rowsPerPage;
            renderTableSiswa(filteredSiswa.slice(start, start + rowsPerPage));
            document.getElementById('pagination-info').innerText = `Total: ${filteredSiswa.length} Murid`;
        }

        function renderTableSiswa(list) {
            const thead = document.getElementById('table-siswa-head');
            const tbody = document.getElementById('table-siswa-body');
            let cols = [];
            
            // Penyesuaian Kolom Sesuai Instruksi Terbaru
            switch(currentSiswaSubMenu) {
                case 'siswa-pribadi': 
                    cols = ['nama', 'kelas', 'nis', 'nisn', 'nik', 'jk', 'tmpt_lahir', 'tgl_lahir', 'agama', 'akte', 'disabilitas', 'status_aktif']; 
                    break;
                case 'siswa-keluarga': 
                    cols = ['nama', 'kelas', 'nomor_kk', 'anak_ke', 'jumlah_saudara', 'jns_tinggal', 'status_aktif']; 
                    break;
                case 'siswa-ortu': 
                    cols = ['nama', 'kelas', 'ayah_nama', 'ayah_nik', 'ayah_pekerjaan', 'ibu_nama', 'ibu_nik', 'ibu_pekerjaan', 'status_aktif']; 
                    break;
                case 'siswa-alamat': 
                    cols = ['nama', 'kelas', 'alamat', 'rt', 'rw', 'kelurahan', 'kecamatan', 'kodepos', 'lintang', 'bujur', 'status_aktif']; 
                    break;
                case 'siswa-keadaan': 
                    cols = ['nama', 'kelas', 'transportasi', 'jarak', 'kip', 'kps', 'pip', 'no_kip', 'nama_kip', 'kks', 'alasan_pip', 'status_aktif']; 
                    break;
                case 'siswa-periodik': 
                    cols = ['nama', 'kelas', 'berat_badan', 'tinggi_badan', 'lingkar_kepala', 'hobi', 'cita_cita', 'sekolah_asal', 'status_aktif']; 
                    break;
                case 'siswa-kontak': 
                    cols = ['nama', 'kelas', 'hp', 'telp', 'email', 'status_aktif']; 
                    break;
            }

            thead.innerHTML = `<tr>${cols.map(c => `<th class="p-3 border-r whitespace-nowrap">${colMap[c] || c}</th>`).join('')}</tr>`;
            tbody.innerHTML = list.map(s => `
                <tr class="hover:bg-blue-50 border-b">
                    // Di dalam tbody.innerHTML = list.map(s => ...
${cols.map(c => {
    let val = s[c] || '-';
    
    // KHUSUS UNTUK TANGGAL LAHIR
    if (c === 'tgl_lahir') {
        val = formatTanggalIndo(val);
    }
    
    if (c === 'status_aktif') {
        const color = val.toLowerCase() === 'aktif' ? 'text-green-600' : 'text-red-500';
        return `<td class="p-3 font-bold ${color}">${val}</td>`;
    }
    return `<td class="p-3 border-r whitespace-nowrap">${val}</td>`;
}).join('')}
                </tr>
            `).join('');
        }

        function showSection(id) {
            document.querySelectorAll('main > div > div').forEach(d => d.classList.add('hidden'));
            if (id.startsWith('siswa-')) {
                currentSiswaSubMenu = id;
                document.getElementById('section-siswa-container').classList.remove('hidden');
                document.getElementById('siswa-table-title').innerText = id.replace(/-/g, ' ').toUpperCase();
                resetAndFilter();
            }
            document.getElementById('section-title').innerText = id.replace(/-/g, ' ').toUpperCase();
        }

        function toggleSubmenu(id) { document.getElementById(id).classList.toggle('hidden'); }
        function resetAndFilter() { currentPage = 1; filterSiswa(); }
        function prevPage() { if (currentPage > 1) { currentPage--; updatePagination(); } }
        function nextPage() { if (currentPage * rowsPerPage < filteredSiswa.length) { currentPage++; updatePagination(); } }

        window.onload = loadData;
    </script>
</body>
</html>
