<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - SDN Ranca Tales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
    
    /* Layout fix agar bisa scroll */
    .main-container { height: calc(100vh - 65px); overflow-y: auto; }
    
    .sidebar-link.active { background-color: #eff6ff; color: #2563eb; border-right: 4px solid #2563eb; font-weight: 700; }
    .submenu-link.active-sub { color: #2563eb; background-color: #f1f5f9; font-weight: 700; }
    
    .submenu-link { 
        padding: 0.5rem 1rem 0.5rem 2.5rem; 
        font-size: 0.8rem; color: #64748b; 
        transition: all 0.2s; cursor: pointer; display: block; 
        border-radius: 8px; margin: 2px 8px;
    }
    .submenu-link:hover { color: #2563eb; background-color: #f8fafc; }
    
    /* Table styling */
    .sticky-header th { sticky; top: 0; z-index: 10; background: #f8fafc; }
    .table-container { max-height: 70vh; overflow-y: auto; }
</style>
</head>
<body class="bg-gray-50 text-gray-800">

<!-- Modal Mutasi/Lulus -->
<div id="modalAction" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
        <div id="modalHeader" class="p-4 text-white font-bold uppercase text-center"></div>
        <div class="p-6 space-y-4">
            <div class="grid grid-cols-2 gap-4 text-xs">
                <div>
                    <label class="block text-gray-400 font-bold uppercase">Nama Murid</label>
                    <p id="m-nama" class="font-bold text-gray-700">-</p>
                </div>
                <div>
                    <label class="block text-gray-400 font-bold uppercase">Kelas</label>
                    <p id="m-kelas" class="font-bold text-gray-700">-</p>
                </div>
            </div>
            
            <div id="form-mutasi" class="hidden space-y-3">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase">Sekolah Tujuan</label>
                    <input type="text" id="m-tujuan" class="w-full border p-2 rounded-lg text-sm outline-blue-500" placeholder="Masukkan nama sekolah...">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase">Tanggal Mutasi</label>
                    <input type="date" id="m-tgl-keluar" class="w-full border p-2 rounded-lg text-sm">
                </div>
            </div>

            <div id="form-lulus" class="hidden space-y-3">
                <div class="grid grid-cols-2 gap-4 text-xs">
                    <div>
                        <label class="block text-gray-400 font-bold uppercase">NIS</label>
                        <p id="m-nis" class="font-bold text-gray-700">-</p>
                    </div>
                    <div>
                        <label class="block text-gray-400 font-bold uppercase">NISN</label>
                        <p id="m-nisn" class="font-bold text-gray-700">-</p>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase">Nomor Ijazah</label>
                    <input type="text" id="m-ijazah" class="w-full border p-2 rounded-lg text-sm outline-blue-500" placeholder="Contoh: DN-28/M-SD/01/...">
                </div>
            </div>

            <div class="flex space-x-3 pt-4">
                <button onclick="closeModal()" class="flex-1 py-2 bg-gray-100 text-gray-600 rounded-xl font-bold uppercase text-xs hover:bg-gray-200">Batal</button>
                <button id="btnKonfirmasi" class="flex-1 py-2 text-white rounded-xl font-bold uppercase text-xs">Konfirmasi</button>
            </div>
        </div>
    </div>
</div>

<div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-72 bg-white border-r border-gray-200 flex flex-col overflow-y-auto">
        <div class="p-6">
            <h1 class="text-xl font-bold text-blue-600 uppercase">PANEL ADMIN</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1 font-bold">SD NEGERI RANCA TALES</p>
        </div>
        
        <nav class="flex-1 px-4 space-y-1">
            <a href="#" onclick="showSection('dashboard')" id="link-dashboard" class="sidebar-link active flex items-center p-3 rounded-lg hover:bg-gray-50 transition">
                <i class="fas fa-home mr-3 w-5"></i> Dashboard
            </a>

            <!-- Menu Siswa -->
            <div>
                <button onclick="toggleSubmenu('sub-murid')" class="w-full sidebar-link flex items-center justify-between p-3 rounded-lg hover:bg-gray-50 transition">
                    <span class="flex items-center"><i class="fas fa-user-graduate mr-3 w-5"></i>Siswa</span>
                    <i class="fas fa-chevron-down text-[10px]"></i>
                </button>
                <div id="sub-murid" class="hidden space-y-1 mt-1">
                    <div onclick="showSection('siswa-pribadi')" class="submenu-link">Data Siswa Aktif</div>
                    <div onclick="showSection('siswa-periodik')" class="submenu-link">Data Periodik</div>
                    <div onclick="showSection('siswa-registrasi')" class="submenu-link">Data Registrasi</div>
                    <div onclick="showSection('siswa-lulus')" class="submenu-link">Siswa Lulus</div>
                </div>
            </div>

            <!-- Menu Mutasi -->
            <div>
                <button onclick="toggleSubmenu('sub-mutasi')" class="w-full sidebar-link flex items-center justify-between p-3 rounded-lg hover:bg-gray-50 transition">
                    <span class="flex items-center"><i class="fas fa-exchange-alt mr-3 w-5"></i> Mutasi</span>
                    <i class="fas fa-chevron-down text-[10px]"></i>
                </button>
                <div id="sub-mutasi" class="hidden space-y-1 mt-1">
                    <div onclick="showSection('mutasi-masuk')" class="submenu-link">Mutasi Masuk</div>
                    <div onclick="showSection('mutasi-keluar')" class="submenu-link">Mutasi Keluar</div>
                </div>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0">
    <!-- Header Tetap (Sticky) -->
    <header class="bg-white border-b p-4 flex justify-between items-center z-30">
        <h2 id="section-title" class="font-bold text-gray-700 uppercase tracking-tight">Dashboard Utama</h2>
        <div class="flex items-center space-x-3">
            <div class="text-right hidden md:block">
                <p id="admin-name" class="text-sm font-bold uppercase italic text-blue-700">Memuat Nama...</p>
                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Operator SDN Ranca Tales</p>
            </div>
            <div class="relative">
                <button onclick="toggleUserMenu()" class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold hover:shadow-lg transition-all" id="userMenuBtn">H</button>
                <div id="userDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl border py-2 z-50">
                    <a href="#" class="flex items-center px-4 py-3 text-sm text-red-600 hover:bg-red-50 font-bold">
                        <i class="fas fa-sign-out-alt mr-3"></i> LOGOUT
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Area Konten yang Bisa di-Scroll -->
    <div class="flex-1 overflow-y-auto p-4 md:p-6 bg-gray-50 main-container">
        <!-- Dashboard Section -->
        <div id="section-dashboard" class="space-y-6 animate-fade-in">
             <!-- Baris Statistik -->
             <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                <div class="bg-white p-4 rounded-xl border-l-4 border-blue-600 shadow-sm">
                    <p class="text-[10px] text-gray-500 font-bold uppercase">Murid Aktif</p>
                    <h4 id="stat-murid" class="text-2xl font-black text-blue-600 mt-1">...</h4>
                </div>
                <!-- ... Ulangi untuk Guru, Tendik, Masuk, Keluar ... -->
             </div>

             <!-- Grid Grafik -->
             <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-white p-5 rounded-2xl border shadow-sm h-80 flex flex-col">
                    <h3 class="text-xs font-bold text-gray-500 mb-4 uppercase text-center">Distribusi Umur</h3>
                    <div class="flex-1 min-h-0"><canvas id="chartUmur"></canvas></div>
                </div>
                <div class="bg-white p-5 rounded-2xl border shadow-sm h-80 flex flex-col">
                    <h3 class="text-xs font-bold text-gray-500 mb-4 uppercase text-center">Agama Murid</h3>
                    <div class="flex-1 min-h-0"><canvas id="chartAgama"></canvas></div>
                </div>
                <div class="bg-white p-5 rounded-2xl border shadow-sm h-80 flex flex-col">
                    <h3 class="text-xs font-bold text-gray-500 mb-4 uppercase text-center">Pekerjaan Ortu</h3>
                    <div class="flex-1 min-h-0"><canvas id="chartPekerjaan"></canvas></div>
                </div>
                <!-- Tambahkan grafik lainnya sesuai kebutuhan -->
             </div>
        </div>

        <!-- Section Tabel -->
        <div id="section-tabel-container" class="hidden space-y-4">
             <!-- Filter Bar (Sticky) -->
             <div class="bg-white p-4 rounded-xl border shadow-sm flex flex-wrap gap-3 justify-between items-center sticky top-0 z-20">
                <h3 id="tabel-title" class="font-bold text-blue-600 uppercase text-xs">DATA MURID</h3>
                <div class="flex flex-wrap gap-2">
                    <select id="filter-kelas" onchange="resetAndFilter()" class="border p-2 rounded-lg text-xs bg-gray-50 font-bold uppercase cursor-pointer">
                        <option value="">Semua Kelas</option>
                        <!-- Opsi Kelas 1A-6B -->
                    </select>
                    <input type="text" id="search-data" onkeyup="resetAndFilter()" placeholder="Cari Nama Murid..." class="border p-2 rounded-lg text-xs outline-blue-500 w-48 md:w-64">
                </div>
             </div>

             <!-- Table Wrapper -->
             <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
                <div class="overflow-x-auto table-container">
                    <table class="w-full text-[11px] text-left">
                        <thead id="thead-data" class="bg-gray-100 border-b text-gray-600 sticky top-0 z-10"></thead>
                        <tbody id="tbody-data" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <div class="p-4 border-t bg-gray-50 flex justify-between items-center">
                    <p id="pagination-info" class="text-[10px] font-bold text-gray-400 uppercase"></p>
                    <div class="flex gap-2">
                        <button onclick="prevPage()" class="p-2 px-4 bg-white border rounded-lg hover:bg-gray-100 font-bold text-[10px]">PREV</button>
                        <button onclick="nextPage()" class="p-2 px-4 bg-white border rounded-lg hover:bg-gray-100 font-bold text-[10px]">NEXT</button>
                    </div>
                </div>
             </div>
        </div>
    </div>
</main>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbweLDASRb8-AbSrlD83kE3GsWBuQdPB0W0uqTW9BMBxrCsCtugADV0O9DFSQjhL0wwPIw/exec";
    let masterData = [];
    let filteredData = [];
    let currentPage = 1;
    let rowsPerPage = 10;
    let currentMenu = 'siswa-pribadi';
    let charts = {};

    // 1. Inisialisasi Saat Load
    window.onload = function() {
        loadData();
    };

    // 2. Load Data Utama
    async function loadData() {
        try {
            const res = await fetch(`${API_URL}?action=getAllData`);
            const result = await res.json();
            
            if (result.status === "success") {
                masterData = result.data.siswa || [];
                
                // Update Identitas Admin
                if (result.data.users && result.data.users[0]) {
                    const u = result.data.users[0];
                    document.getElementById('admin-name').innerText = u.nama;
                    document.getElementById('userMenuBtn').innerText = u.nama.charAt(0).toUpperCase();
                }

                updateStats();
                initCharts(); 
                // Default view adalah dashboard, tapi siapkan data tabel di background
                filterData(); 
            }
        } catch (e) {
            console.error("Gagal memuat data:", e);
            alert("Koneksi ke database gagal. Periksa sinyal internet Anda.");
        }
    }

    // 3. Statistik (Counter Atas)
    function updateStats() {
        const aktif = masterData.filter(s => String(s.status_aktif).toLowerCase() === 'aktif');
        document.getElementById('stat-murid').innerText = aktif.length;
        
        const masuk = masterData.filter(s => s.tgl_masuk && s.tgl_masuk !== '-').length;
        document.getElementById('stat-masuk').innerText = masuk;
        
        const keluar = masterData.filter(s => s.tgl_keluar && s.tgl_keluar !== '-').length;
        document.getElementById('stat-keluar').innerText = keluar;
    }

    // 4. Logika Grafik (Optimasi Chart.js)
    function initCharts() {
        const dataAktif = masterData.filter(s => String(s.status_aktif).toLowerCase() === 'aktif');
        if (dataAktif.length === 0) return;

        // --- Grafik Umur ---
        let katUmur = { "< 7": 0, "7-8": 0, "8-9": 0, "9-10": 0, "10-11": 0, "11-12": 0, "> 12": 0 };
        dataAktif.forEach(s => {
            const thn = parseInt((s.umur || "0").split(' ')[0]);
            if (thn < 7) katUmur["< 7"]++;
            else if (thn < 8) katUmur["7-8"]++;
            else if (thn < 9) katUmur["8-9"]++;
            else if (thn < 10) katUmur["9-10"]++;
            else if (thn < 11) katUmur["10-11"]++;
            else if (thn < 12) katUmur["11-12"]++;
            else katUmur["> 12"]++;
        });
        renderChart('chartUmur', 'pie', 'Umur', Object.keys(katUmur), Object.values(katUmur), ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#06b6d4', '#475569']);

        // --- Grafik Agama ---
        const listAgama = ["Islam", "Kristen", "Katolik", "Hindu", "Budha", "Konghucu"];
        let dataAgama = listAgama.map(a => dataAktif.filter(s => (s.agama || "").toLowerCase() === a.toLowerCase()).length);
        renderChart('chartAgama', 'bar', 'Agama', listAgama, dataAgama, '#0ea5e9');

        // --- Grafik Pekerjaan (Top 5) ---
        let pkrj = {};
        dataAktif.forEach(s => {
            let p = s.ayah_pekerjaan || "Lainnya";
            if(p !== '-') pkrj[p] = (pkrj[p] || 0) + 1;
        });
        const sortedPkrj = Object.entries(pkrj).sort((a,b) => b[1] - a[1]).slice(0, 5);
        renderChart('chartPekerjaan', 'bar', 'Pekerjaan', sortedPkrj.map(x => x[0]), sortedPkrj.map(x => x[1]), '#6366f1');
    }

    function renderChart(id, type, label, labels, data, colors) {
        const ctx = document.getElementById(id);
        if (!ctx) return;
        if (charts[id]) charts[id].destroy(); // Hapus chart lama agar tidak tumpang tindih

        charts[id] = new Chart(ctx, {
            type: type,
            data: {
                labels: labels,
                datasets: [{ label: label, data: data, backgroundColor: colors, borderWidth: 0 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } }
            }
        });
    }

    // 5. Navigasi & Tabel
    function showSection(id) {
        currentMenu = id;
        document.querySelectorAll('.sidebar-link, .submenu-link').forEach(l => l.classList.remove('active', 'active-sub'));
        
        if (id === 'dashboard') {
            document.getElementById('link-dashboard').classList.add('active');
            document.getElementById('section-dashboard').classList.remove('hidden');
            document.getElementById('section-tabel-container').classList.add('hidden');
            document.getElementById('section-title').innerText = "Dashboard Utama";
        } else {
            document.getElementById('section-dashboard').classList.add('hidden');
            document.getElementById('section-tabel-container').classList.remove('hidden');
            document.getElementById('section-title').innerText = id.replace(/-/g, ' ').toUpperCase();
            resetAndFilter();
        }
    }

    function filterData() {
        const keyword = document.getElementById('search-data').value.toLowerCase();
        const kls = document.getElementById('filter-kelas').value;

        filteredData = masterData.filter(s => {
            const matchNama = (s.nama || "").toLowerCase().includes(keyword);
            const matchKelas = kls === "" || String(s.kelas) === kls;
            
            // Filter berdasarkan menu yang aktif
            if (currentMenu === 'siswa-pribadi' || currentMenu === 'siswa-periodik' || currentMenu === 'siswa-registrasi') {
                return matchNama && matchKelas && String(s.status_aktif).toLowerCase() === 'aktif';
            }
            if (currentMenu === 'siswa-lulus') return matchNama && matchKelas && String(s.status_aktif).toLowerCase() === 'lulus';
            if (currentMenu === 'mutasi-masuk') return matchNama && matchKelas && s.tgl_masuk && s.tgl_masuk !== '-';
            if (currentMenu === 'mutasi-keluar') return matchNama && matchKelas && s.tgl_keluar && s.tgl_keluar !== '-';
            
            return matchNama && matchKelas;
        });
        updatePagination();
    }

    function renderTable(list) {
        const tbody = document.getElementById('tbody-data');
        const thead = document.getElementById('thead-data');
        let cols = [];

        // Definisi Kolom per Menu
        if (currentMenu === 'siswa-pribadi') {
            cols = ['nama', 'jk', 'kelas', 'nisn', 'tmpt_lahir', 'tgl_lahir', 'ayah_nama', 'ibu_nama', 'status_aktif'];
        } else if (currentMenu === 'siswa-periodik') {
            cols = ['nama', 'jk', 'kelas', 'bb', 'tb', 'umur', 'hobi', 'cita_cita'];
        } else if (currentMenu === 'siswa-registrasi') {
            cols = ['nama', 'kelas', 'tgl_masuk', 'sekolah_asal', 'keterangan_siswa', 'aksi'];
        } else if (currentMenu === 'siswa-lulus') {
            cols = ['nama', 'jk', 'nis', 'nisn', 'thn_ajaran_lulus', 'status_aktif'];
        } else {
            cols = ['nama', 'kelas', 'tgl_keluar', 'alasan', 'status_aktif'];
        }

        // Render Header
        thead.innerHTML = `<tr>${cols.map(c => `<th class="p-3 border-r whitespace-nowrap text-center">${colMap[c] || c.toUpperCase()}</th>`).join('')}</tr>`;

        // Render Body
        tbody.innerHTML = list.length > 0 ? list.map(s => `
            <tr class="hover:bg-blue-50 border-b transition-colors">
                ${cols.map(c => {
                    if (c === 'aksi') return `<td class="p-2 flex justify-center gap-1">
                        <button onclick="openModal('${s.id}', 'keluar')" class="bg-orange-500 text-white p-1 px-2 rounded text-[9px] font-bold">MUTASI</button>
                        <button onclick="openModal('${s.id}', 'lulus')" class="bg-green-600 text-white p-1 px-2 rounded text-[9px] font-bold">LULUS</button>
                    </td>`;
                    
                    let val = s[c] || '-';
                    if(['tgl_lahir', 'tgl_masuk', 'tgl_keluar'].includes(c)) val = formatTanggalIndo(val);
                    
                    let colorClass = "";
                    if(val === 'Aktif') colorClass = "text-green-600 font-bold";
                    if(val === 'Lulus') colorClass = "text-blue-600 font-bold";
                    
                    return `<td class="p-3 border-r whitespace-nowrap ${colorClass}">${val}</td>`;
                }).join('')}
            </tr>
        `).join('') : `<tr><td colspan="${cols.length}" class="p-10 text-center text-gray-400 italic font-bold">DATA TIDAK DITEMUKAN</td></tr>`;
    }

    // Fungsi Pembantu Lainnya
    function updatePagination() {
        const start = (currentPage - 1) * rowsPerPage;
        const slice = filteredData.slice(start, start + rowsPerPage);
        renderTable(slice);
        document.getElementById('pagination-info').innerText = `Data ${start + 1} - ${Math.min(start + rowsPerPage, filteredData.length)} dari ${filteredData.length} Murid`;
    }
    
    function prevPage() { if (currentPage > 1) { currentPage--; updatePagination(); } }
    function nextPage() { if (currentPage * rowsPerPage < filteredData.length) { currentPage++; updatePagination(); } }
    function resetAndFilter() { currentPage = 1; filterData(); }
    function toggleUserMenu() { document.getElementById('userDropdown').classList.toggle('hidden'); }
    function toggleSubmenu(id) { document.getElementById(id).classList.toggle('hidden'); }
    function formatTanggalIndo(dateStr) {
        if (!dateStr || dateStr === '-' || dateStr === 'undefined') return '-';
        let date = new Date(dateStr);
        if (isNaN(date.getTime())) return dateStr;
        const bln = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
        return `${date.getDate()} ${bln[date.getMonth()]} ${date.getFullYear()}`;
    }
</script>
</body>
</html>
