<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panel Kelas</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-gray-100">

<div class="p-5">

    <!-- Header -->
    <div class="flex justify-between">

        <div>
            <h1 class="text-2xl font-bold">
                Dashboard Kelas
            </h1>

            <p id="namaKelas"></p>
        </div>

        <button onclick="logout()"
        class="bg-red-500 text-white px-4 py-2 rounded">

            Logout

        </button>

    </div>


    <!-- Statistik -->

    <div class="grid grid-cols-3 gap-3 mt-5">

        <div class="bg-white p-4 rounded">

            Jumlah siswa

            <h2 id="jumlahSiswa"
            class="text-3xl font-bold">
            0
            </h2>

        </div>


        <div class="bg-white p-4 rounded">

            Laki-laki

            <h2 id="jumlahL"
            class="text-3xl font-bold">
            0
            </h2>

        </div>


        <div class="bg-white p-4 rounded">

            Perempuan

            <h2 id="jumlahP"
            class="text-3xl font-bold">
            0
            </h2>

        </div>

    </div>



    <!-- Grafik -->

    <div class="bg-white p-4 mt-5 rounded">

        <canvas id="grafikGender"></canvas>

    </div>



    <!-- Tabel siswa -->

    <div class="bg-white mt-5 p-4 rounded">

        <table class="w-full">

            <thead>

                <tr>

                    <th>NISN</th>
                    <th>Nama</th>
                    <th>JK</th>
                    <th>BB</th>
                    <th>TB</th>
                    <th>Aksi</th>

                </tr>

            </thead>

            <tbody id="tableSiswa">

            </tbody>

        </table>

    </div>

</div>



<script>

let dataSiswa=[];


/*
=====================
AMBIL USER LOGIN
=====================
*/

const user =
JSON.parse(
localStorage.getItem("userLogin")
);

const kelasAkses =
user.akses_kelas;

document.getElementById(
"namaKelas"
).innerHTML=
"Kelas : "+kelasAkses;



/*
=====================
LOAD SISWA
=====================
*/

function loadData(){

google.script.run
.withSuccessHandler(res=>{

dataSiswa=res.filter(
s=>s.kelas===kelasAkses
);

renderTabel();
renderStat();
renderGrafik();

})
.getDataSiswa();

}


loadData();



/*
=====================
TABEL
=====================
*/

function renderTabel(){

let html="";

dataSiswa.forEach((s,i)=>{

html+=`

<tr class="border-b">

<td>${s.nisn}</td>

<td>${s.nama}</td>

<td>${s.jk}</td>

<td>${s.bb}</td>

<td>${s.tb}</td>

<td>

<button
onclick="editSiswa(${i})"
class="bg-blue-500 text-white px-2 rounded">

Edit

</button>


<button
onclick="luluskan('${s.nisn}')"
class="bg-green-500 text-white px-2 rounded">

Lulus

</button>

</td>

</tr>

`;

});

document.getElementById(
"tableSiswa"
).innerHTML=html;

}



/*
=====================
STATISTIK
=====================
*/

function renderStat(){

let laki=
dataSiswa.filter(
s=>s.jk=="L"
).length;

let perempuan=
dataSiswa.filter(
s=>s.jk=="P"
).length;


document.getElementById(
"jumlahSiswa"
).innerHTML=
dataSiswa.length;

document.getElementById(
"jumlahL"
).innerHTML=
laki;

document.getElementById(
"jumlahP"
).innerHTML=
perempuan;

}



/*
=====================
GRAFIK
=====================
*/

function renderGrafik(){

let laki=
dataSiswa.filter(
s=>s.jk=="L"
).length;

let perempuan=
dataSiswa.filter(
s=>s.jk=="P"
).length;


new Chart(

document.getElementById(
"grafikGender"
),

{

type:"bar",

data:{

labels:[
"Laki-laki",
"Perempuan"
],

datasets:[{

data:[
laki,
perempuan
]

}]

}

});

}



/*
=====================
EDIT SISWA
=====================
*/

function editSiswa(i){

let siswa=
dataSiswa[i];


let bb=
prompt(
"Berat badan",
siswa.bb
);

let tb=
prompt(
"Tinggi badan",
siswa.tb
);


google.script.run
.updatePeriodik(

siswa.nisn,
bb,
tb

);


alert(
"Berhasil disimpan"
);

loadData();

}



/*
=====================
LULUSKAN SATU
=====================
*/

function luluskan(nisn){

if(
confirm("Luluskan siswa?")
){

google.script.run
.luluskanSatu(nisn);

loadData();

}

}



/*
=====================
LOGOUT
=====================
*/

function logout(){

localStorage.clear();

window.location=
"index.html";

}


</script>

</body>
</html>
