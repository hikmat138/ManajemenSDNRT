<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANEL ADMIN - SDN RANCA TALES</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --brand-blue: #0066FF; --brand-blue-soft: rgba(0, 102, 255, 0.08); --airbnb-dark: #222222; --airbnb-gray: #717171; --border-light: #EBEBEB; }
        body { background: #FFFFFF; font-family: 'Inter', sans-serif; color: var(--airbnb-dark); margin: 0; }
        #sidebar { width: 280px; height: 100vh; position: fixed; background: #FFFFFF; border-right: 1px solid var(--border-light); transition: 0.3s; z-index: 1000; overflow-y: auto; }
        #content { margin-left: 280px; min-height: 100vh; transition: 0.3s; }
        .sidebar-header { padding: 30px 24px; border-bottom: 1px solid var(--border-light); }
        .nav-link { color: var(--airbnb-gray); padding: 12px 24px; font-weight: 500; display: flex; align-items: center; border-left: 4px solid transparent; text-decoration: none; }
        .nav-link:hover { background: #F7F7F7; color: var(--airbnb-dark); }
        .nav-link.active { background: var(--brand-blue-soft); color: var(--brand-blue); border-left-color: var(--brand-blue); font-weight: 600; }
        .nav-label { padding: 20px 24px 10px; font-size: 0.7rem; font-weight: 700; color: #B0B0B0; text-transform: uppercase; letter-spacing: 1px; }
        .navbar { background: #FFFFFF; padding: 15px 40px; border-bottom: 1px solid var(--border-light); position: sticky; top: 0; z-index: 999; }
        .stat-card { border: 1px solid var(--border-light); border-radius: 16px; padding: 24px; }
        .data-tabs { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px; border-bottom: 1px solid var(--border-light); }
        .tab-item { cursor: pointer; padding: 10px 20px; white-space: nowrap; font-size: 0.85rem; font-weight: 600; color: var(--airbnb-gray); border-radius: 8px; }
        .tab-item.active { background: var(--brand-blue); color: white; }
        .table-container { background: #FFFFFF; border: 1px solid var(--border-light); border-radius: 16px; overflow: hidden; }
        .table thead th { background: #F9F9F9; font-size: 0.7rem; text-transform: uppercase; padding: 15px; color: var(--airbnb-gray); white-space: nowrap; }
        .sticky-col { position: sticky; left: 0; background: white !important; z-index: 2; border-right: 1px solid var(--border-light) !important; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <h4 class="fw-bold m-0" style="color: var(--brand-blue);">PANEL ADMIN</h4>
            <small class="text-muted">SDN RANCA TALES</small>
        </div>
        <div class="nav-section">
            <div class="nav-label">Overview</div>
            <a href="javascript:void(0)" class="nav-link active" onclick="showPage('dashboard')"><i class="fa fa-chart-line me-3"></i> Dashboard</a>
            
            <div class="nav-label">Kesiswaan</div>
            <a href="javascript:void(0)" class="nav-link" onclick="showPage('siswa')"><i class="fa fa-user-graduate me-3"></i> Data Murid</a>
            <a href="javascript:void(0)" class="nav-link" onclick="showPage('mutasi_masuk')"><i class="fa fa-sign-in-alt me-3"></i> Mutasi Masuk</a>
            <a href="javascript:void(0)" class="nav-link" onclick="showPage('mutasi_keluar')"><i class="fa fa-sign-out-alt me-3"></i> Mutasi Keluar</a>
            <a href="javascript:void(0)" class="nav-link" onclick="showPage('riwayat_cohort')"><i class="fa fa-history me-3"></i> Riwayat Cohort</a>

            <div class="nav-label">Ketenagaan</div>
            <a href="javascript:void(0)" class="nav-link" onclick="showPage('guru')"><i class="fa fa-chalkboard-teacher me-3"></i> Data Guru</a>

            <div class="nav-label">Sarpras</div>
            <a href="javascript:void(0)" class="nav-link" onclick="showPage('inventaris')"><i class="fa fa-boxes me-3"></i> Inventaris Barang</a>
        </div>
    </nav>

    <div id="content">
        <nav class="navbar d-flex justify-content-between">
            <h5 class="fw-bold m-0" id="pageTitle">Dashboard</h5>
            <div class="d-flex align-items-center">
                <div class="text-end me-3">
                    <span id="adminName" class="fw-bold d-block small">Memuat Nama...</span>
                    <small class="text-muted" style="font-size: 0.7rem;">Operator Sekolah</small>
                </div>
                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center fw-bold" style="width: 35px; height: 35px;">P</div>
            </div>
        </nav>

        <div class="p-4 p-lg-5" id="mainView">
            <!-- Dashboard Section -->
            <div id="page-dashboard">
                <div class="row g-4 mb-4">
                    <div class="col-md-3"><div class="stat-card"><small class="text-muted fw-bold">TOTAL SISWA</small><h2 class="fw-bold m-0 mt-2" id="countSiswa">0</h2></div></div>
                    <div class="col-md-3"><div class="stat-card"><small class="text-muted fw-bold">TOTAL GURU</small><h2 class="fw-bold m-0 mt-2" id="countGuru">0</h2></div></div>
                    <div class="col-md-6"><div class="stat-card"><canvas id="chartUtama" height="100"></canvas></div></div>
                </div>
            </div>

            <!-- Table Section -->
            <div id="page-table" style="display:none;">
                <div id="siswaTabs" class="data-tabs" style="display:none;">
                    <div class="tab-item active" onclick="switchSiswaTab('pribadi')">Data Pribadi</div>
                    <div class="tab-item" onclick="switchSiswaTab('keluarga')">Data Keluarga</div>
                    <div class="tab-item" onclick="switchSiswaTab('orangtua')">Data Orang Tua</div>
                    <div class="tab-item" onclick="switchSiswaTab('periodik')">Data Periodik</div>
                    <div class="tab-item" onclick="switchSiswaTab('lainnya')">Lainnya</div>
                </div>
                
                <div class="table-container">
                    <div class="table-responsive">
                        <table class="table align-middle m-0">
                            <thead id="tableHeader"></thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbweLDASRb8-AbSrlD83kE3GsWBuQdPB0W0uqTW9BMBxrCsCtugADV0O9DFSQjhL0wwPIw/exec";
        let allData = {};
        let currentSiswaTab = 'pribadi';

        // Konfigurasi Kolom Sesuai Request Bapak
        const columns = {
            siswa: {
                pribadi: ["nama", "nis", "jk", "nisn", "tmpt_lahir", "tgl_lahir", "nik", "agama", "alamat", "status_aktif"],
                keluarga: ["nama", "akte", "kk", "anak_ke", "saudara", "rt", "rw", "dusun", "kelurahan", "kecamatan"],
                orangtua: ["nama", "ayah_nama", "ayah_nik", "ayah_pekerjaan", "ibu_nama", "ibu_nik", "ibu_pekerjaan", "wali_nama"],
                periodik: ["nama", "kelas", "bbtb", "lingkar_kepala", "hobi", "cita_cita", "sekolah_asal"],
                lainnya: ["nama", "kip", "pip", "no_kip", "kks", "disabilitas", "hp", "email"]
            },
            guru: ["nama", "ttn", "nik", "nuptk", "jabatan", "gol", "pangkat", "tmt_sekolah", "status_pegawai"],
            mutasi_masuk: ["id", "nama", "asal_sekolah", "tgl_masuk", "kelas_tujuan", "tahun_ajaran"],
            mutasi_keluar: ["id", "nama", "sekolah_tujuan", "tgl_keluar", "alasan"],
            inventaris: ["id", "nama_barang", "kategori", "jumlah", "konsisi", "lokasi_kelas"],
            riwayat_cohort: ["tahun_ajaran", "bulan", "kelas", "jml_awal", "masuk", "keluar", "jml_akhir"]
        };

        async function loadAllData() {
            try {
                const response = await fetch(`${API_URL}?action=getAllData`);
                const res = await response.json();
                if (res.status === "success") {
                    allData = res.data;
                    document.getElementById('adminName').innerText = res.adminName || "Nama Tidak Ditemukan";
                    document.getElementById('countSiswa').innerText = allData.siswa.length;
                    document.getElementById('countGuru').innerText = allData.guru.length;
                    renderChart();
                }
            } catch (e) {
                Swal.fire('Error', 'Gagal memuat data dari Spreadsheet', 'error');
            }
        }

        function showPage(page) {
            const views = ['dashboard', 'table'];
            const titleMap = { dashboard: 'Ringkasan Sistem', siswa: 'Data Murid', guru: 'Data Guru', mutasi_masuk: 'Mutasi Masuk', mutasi_keluar: 'Mutasi Keluar', inventaris: 'Inventaris Barang', riwayat_cohort: 'Riwayat Cohort' };
            
            document.getElementById('pageTitle').innerText = titleMap[page];
            document.getElementById('page-dashboard').style.display = page === 'dashboard' ? 'block' : 'none';
            document.getElementById('page-table').style.display = page !== 'dashboard' ? 'block' : 'none';
            document.getElementById('siswaTabs').style.display = page === 'siswa' ? 'flex' : 'none';

            if (page !== 'dashboard') renderGeneralTable(page);
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function renderGeneralTable(page) {
            const thead = document.getElementById('tableHeader');
            const tbody = document.getElementById('tableBody');
            let cols = (page === 'siswa') ? columns.siswa[currentSiswaTab] : columns[page];
            let data = allData[page] || [];

            thead.innerHTML = `<tr>${cols.map(c => `<th class="${c === 'nama' ? 'sticky-col' : ''}">${c.toUpperCase()}</th>`).join('')}</tr>`;
            tbody.innerHTML = data.map(row => `<tr>${cols.map(c => `<td class="${c === 'nama' ? 'sticky-col fw-bold' : ''}">${row[c] || '-'}</td>`).join('')}</tr>`).join('');
        }

        function switchSiswaTab(tab) {
            currentSiswaTab = tab;
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            renderGeneralTable('siswa');
        }

        function renderChart() {
            const ctx = document.getElementById('chartUtama').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Siswa', 'Guru', 'Mutasi Masuk', 'Mutasi Keluar'],
                    datasets: [{
                        label: 'Statistik Sekolah',
                        data: [allData.siswa.length, allData.guru.length, allData.mutasi_masuk.length, allData.mutasi_keluar.length],
                        backgroundColor: '#0066FF'
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }

        window.onload = loadAllData;
    </script>
</body>
</html>
