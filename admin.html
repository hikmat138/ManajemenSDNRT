<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - SDN Ranca Tales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; overflow: hidden; }
    
    .sidebar-link.active { 
        background-color: #eff6ff; 
        color: #2563eb; 
        border-right: 4px solid #2563eb; 
    }

    .submenu-link { 
        padding-left: 2.5rem; 
        font-size: 0.8rem; 
        color: #64748b; 
        transition: all 0.2s; 
        cursor: pointer; 
        display: block; 
        padding-top: 0.5rem;
        padding-bottom: 0.5rem;
        border-radius: 8px;
        margin: 0 8px;
    }
    
    .submenu-link:hover { 
        color: #2563eb; 
        background-color: #f8fafc;
    }
    
    .hidden { display: none; }
    .overflow-x-auto::-webkit-scrollbar { height: 6px; }
    .overflow-x-auto::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
</style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-72 bg-white border-r border-gray-200 flex flex-col overflow-y-auto">
            <div class="p-6">
                <h1 class="text-xl font-bold text-blue-600 uppercase">PANEL ADMIN MANAJAEMAN KELAS</h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1 font-bold">SD NEGERI RANCA TALES</p>
            </div>
            
            <nav class="flex-1 px-4 space-y-1">
                <a href="#" class="sidebar-link active flex items-center p-3 rounded-lg hover:bg-gray-50 transition">
                    <i class="fas fa-home mr-3 w-5"></i> Dashboard
                </a>

                <!-- Data Murid -->
                <div>
                    <button onclick="toggleSubmenu('sub-murid')" class="w-full sidebar-link flex items-center justify-between p-3 rounded-lg hover:bg-gray-50 transition">
                        <span class="flex items-center"><i class="fas fa-user-graduate mr-3 w-5"></i>Siswa</span>
                        <i class="fas fa-chevron-down text-[10px]"></i>
                    </button>
                    <div id="sub-murid" class="hidden space-y-1 mt-1">
                        <div class="submenu-link">Data Siswa Aktif</div>
                        <div class="submenu-link">Data Registrasi</div>
                        <div class="submenu-link">Siswa Lulus</div>
                    </div>
                </div>

                <!-- Mutasi -->
                <div>
                    <button onclick="toggleSubmenu('sub-mutasi')" class="w-full sidebar-link flex items-center justify-between p-3 rounded-lg hover:bg-gray-50 transition">
                        <span class="flex items-center"><i class="fas fa-exchange-alt mr-3 w-5"></i> Mutasi</span>
                        <i class="fas fa-chevron-down text-[10px]"></i>
                    </button>
                    <div id="sub-mutasi" class="hidden space-y-1 mt-1">
                        <div class="submenu-link">Mutasi Masuk</div>
                        <div class="submenu-link">Mutasi Keluar</div>
                    </div>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-10">
                <h2 class="font-bold text-gray-700 uppercase">Dashboard Utama</h2>
                <div class="flex items-center space-x-3">
                    <div class="text-right">
                        <p id="admin-name" class="text-sm font-bold uppercase italic">HIKMATULLAH, S. Pd., Gr.</p>
                        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">Operator Sekolah</p>
                    </div>
                    <div class="relative">
                        <button class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold uppercase hover:bg-blue-700 transition focus:outline-none">
                            H
                        </button>
                    </div>
                </div>
            </header>

            <div class="p-6">
                <!-- Dashboard Statistics -->
                <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4">
                    <div class="bg-white p-4 rounded-xl border shadow-sm border-l-4 border-l-blue-600">
                        <p class="text-[10px] text-gray-500 font-bold uppercase">Jumlah Murid</p>
                        <h4 id="stat-murid" class="text-2xl font-bold text-blue-600 leading-none mt-2">Memuat...</h4>
                    </div>
                    <div class="bg-white p-4 rounded-xl border shadow-sm border-l-4 border-l-green-600">
                        <p class="text-[10px] text-gray-500 font-bold uppercase">Jumlah Guru</p>
                        <h4 class="text-2xl font-bold text-green-600 leading-none mt-2">0</h4>
                    </div>
                    <div class="bg-white p-4 rounded-xl border shadow-sm border-l-4 border-l-orange-600">
                        <p class="text-[10px] text-gray-500 font-bold uppercase">Jumlah Tendik</p>
                        <h4 class="text-2xl font-bold text-orange-600 leading-none mt-2">0</h4>
                    </div>
                    <div class="bg-white p-4 rounded-xl border shadow-sm border-l-4 border-l-indigo-600">
                        <p class="text-[10px] text-gray-500 font-bold uppercase">Mutasi Masuk</p>
                        <h4 class="text-2xl font-bold text-indigo-600 leading-none mt-2">0</h4>
                    </div>
                    <div class="bg-white p-4 rounded-xl border shadow-sm border-l-4 border-l-red-600">
                        <p class="text-[10px] text-gray-500 font-bold uppercase">Mutasi Keluar</p>
                        <h4 class="text-2xl font-bold text-red-600 leading-none mt-2">0</h4>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleSubmenu(id) {
            const submenu = document.getElementById(id);
            submenu.classList.toggle('hidden');
        }
    </script>
</body>
</html>
