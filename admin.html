<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - SDN RANCA TALES</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --brand-blue: #0066FF;
            --brand-blue-soft: rgba(0, 102, 255, 0.08);
            --airbnb-gray: #717171;
            --airbnb-dark: #222222;
            --border-light: #EBEBEB;
        }

        body { 
            background: #FFFFFF; 
            font-family: 'Inter', sans-serif; 
            color: var(--airbnb-dark);
            overflow-x: hidden;
            margin: 0;
        }

        /* --- SIDEBAR --- */
        #sidebar { 
            width: 260px; height: 100vh; position: fixed; 
            background: #FFFFFF; border-right: 1px solid var(--border-light);
            box-shadow: 4px 0 15px rgba(0,0,0,0.02); transition: 0.3s; z-index: 1000; 
        }
        #sidebar.active { margin-left: -260px; }

        .sidebar-header { padding: 32px 24px; border-bottom: 1px solid var(--border-light); }
        .sidebar-header h5 { font-weight: 800; color: var(--brand-blue); margin: 0; }

        .nav-link { 
            color: var(--airbnb-gray); padding: 14px 24px; font-weight: 500;
            border-left: 4px solid transparent; transition: 0.2s;
        }
        .nav-link:hover { background: #F7F7F7; color: var(--airbnb-dark); }
        .nav-link.active { 
            background: var(--brand-blue-soft); color: var(--brand-blue); 
            border-left-color: var(--brand-blue); font-weight: 600;
        }

        /* --- CONTENT --- */
        #content { width: calc(100% - 260px); margin-left: 260px; transition: 0.3s; min-height: 100vh; }
        #content.active { width: 100%; margin-left: 0; }

        .navbar { background: #FFFFFF; padding: 15px 40px; border-bottom: 1px solid var(--border-light); }
        
        /* --- TABLE --- */
        .table-container { 
            background: #FFFFFF; border-radius: 16px; border: 1px solid var(--border-light);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow: hidden; margin-top: 20px;
        }
        .table-responsive { max-height: 600px; }
        thead th { 
            background: #FFFFFF !important; color: var(--airbnb-gray);
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
            padding: 15px 20px !important; border-bottom: 2px solid var(--border-light) !important;
        }
        tbody td { padding: 15px 20px !important; border-bottom: 1px solid #F7F7F7; font-size: 0.85rem; }
        tbody tr:hover { background-color: #F9F9F9; }
        
        .sticky-col { 
            position: sticky; left: 0; background: white !important; 
            z-index: 2; border-right: 1px solid var(--border-light) !important; 
        }

        /* --- UI ELEMENTS --- */
        .btn-brand { background: var(--brand-blue); color: white; border-radius: 10px; font-weight: 600; padding: 10px 20px; border: none; }
        .btn-brand:hover { background: #0052CC; color: white; }
        .form-select, .form-control { border-radius: 10px; border: 1px solid #B0B0B0; font-size: 0.85rem; }
        .badge-kls { background: var(--brand-blue-soft); color: var(--brand-blue); padding: 5px 10px; border-radius: 6px; font-weight: 600; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="sidebar-header">
            <h5>HKMT OFFICIAL</h5>
            <small class="text-muted fw-bold">SDN RANCA TALES</small>
        </div>
        <div class="mt-3">
            <a href="#" class="nav-link active"><i class="fa fa-user-graduate me-3"></i> Data Murid</a>
            <a href="#" class="nav-link"><i class="fa fa-chalkboard-teacher me-3"></i> Data Guru</a>
            <div style="margin-top: 50px;">
                <a href="#" class="nav-link text-danger" onclick="logout()"><i class="fa fa-power-off me-3"></i> Keluar</a>
            </div>
        </div>
    </nav>

    <div id="content">
        <nav class="navbar d-flex align-items-center">
            <button class="btn btn-light rounded-circle" id="btnToggle"><i class="fa fa-bars"></i></button>
            <div class="ms-auto text-end">
                <span class="fw-bold d-block">Pa Hikmat, S. Pd., Gr.</span>
                <small class="text-muted">Administrator Utama</small>
            </div>
        </nav>

        <div class="p-4 p-lg-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold m-0">Manajemen Data Murid</h4>
                <div>
                    <button class="btn btn-brand" onclick="openModalTambah()"><i class="fa fa-plus me-2"></i> Tambah Murid</button>
                    <button class="btn btn-outline-success ms-2" onclick="exportExcel()"><i class="fa fa-file-excel"></i></button>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <label class="small fw-bold text-muted">FILTER ROMBEL</label>
                    <select id="filterKelas" class="form-select" onchange="renderTable()">
                        <option value="">Semua Kelas</option>
                        <option value="1">Kelas 1</option>
                        <option value="2">Kelas 2</option>
                        <option value="3">Kelas 3</option>
                        <option value="4">Kelas 4</option>
                        <option value="5">Kelas 5</option>
                        <option value="6">Kelas 6</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="small fw-bold text-muted">CARI NAMA</label>
                    <input type="text" id="searchName" class="form-control" placeholder="Ketik nama murid..." onkeyup="renderTable()">
                </div>
            </div>

            <div class="table-container">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr id="tableHeader"></tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="11" class="text-center py-5">Memuat data dari sistem...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbweLDASRb8-AbSrlD83kE3GsWBuQdPB0W0uqTW9BMBxrCsCtugADV0O9DFSQjhL0wwPIw/exec";
        let rawData = [];

        document.getElementById('btnToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('content').classList.toggle('active');
        });

        async function loadData() {
            try {
                const resp = await fetch(`${API_URL}?action=getStats`);
                const res = await resp.json();
                if (res.status === "success") {
                    rawData = res.data || [];
                    renderTable();
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Gagal terhubung ke database.' });
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const thead = document.getElementById('tableHeader');
            const search = document.getElementById('searchName').value.toLowerCase();
            const kelas = document.getElementById('filterKelas').value;

            const headers = ["Aksi", "Nama Lengkap", "NISN", "JK", "Tempat Lahir", "Tgl Lahir", "NIK", "Agama", "Alamat", "Rombel", "Status"];
            thead.innerHTML = headers.map((h, i) => `<th class="${i === 1 ? 'sticky-col' : ''}">${h}</th>`).join('');

            let filtered = rawData.filter(d => 
                (d.nama && d.nama.toLowerCase().includes(search)) && 
                (kelas === "" || d.rombel.toString() === kelas)
            );

            tbody.innerHTML = filtered.map(d => `
                <tr>
                    <td>
                        <button class="btn btn-sm btn-light text-primary" onclick="editData('${d.nisn}')"><i class="fa fa-edit"></i></button>
                        <button class="btn btn-sm btn-light text-danger" onclick="hapusData('${d.nisn}')"><i class="fa fa-trash"></i></button>
                    </td>
                    <td class="sticky-col fw-bold">${d.nama}</td>
                    <td class="text-muted">${d.nisn}</td>
                    <td>${d.jk}</td>
                    <td>${d.tmp_lahir}</td>
                    <td>${d.tgl_lahir}</td>
                    <td class="small text-muted">${d.nik}</td>
                    <td>${d.agama}</td>
                    <td class="text-nowrap text-muted">${d.alamat}</td>
                    <td><span class="badge-kls">Kls ${d.rombel}</span></td>
                    <td><span class="text-success fw-bold">Aktif</span></td>
                </tr>
            `).join('');

            if(filtered.length === 0) tbody.innerHTML = `<tr><td colspan="11" class="text-center py-5">Data murid tidak ditemukan.</td></tr>`;
        }

        function logout() {
            localStorage.removeItem('session_sdnrt');
            window.location.href = 'index.html';
        }

        window.onload = loadData;
    </script>
</body>
</html>
