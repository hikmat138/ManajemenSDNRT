<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SDN RANCA TALES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { background: #0f172a; min-height: 100vh; color: white; padding: 20px; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Navigasi -->
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 shadow-sm mb-4">
                <span class="navbar-brand fw-bold">ADMIN: SDN RANCA TALES</span>
                <div class="ms-auto">
                    <span class="text-light me-3 small" id="adminName">Admin</span>
                    <button onclick="logout()" class="btn btn-outline-danger btn-sm">Keluar</button>
                </div>
            </nav>

            <div class="container">
                <div class="row g-4 mb-4">
                    <!-- Widget Info Cepat -->
                    <div class="col-md-3">
                        <div class="card p-3 text-center">
                            <div class="text-muted small">Total Murid</div>
                            <div class="stat-value" id="totSiswa">0</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card p-3 text-center">
                            <div class="text-muted small">Total Guru</div>
                            <div class="stat-value" id="totGuru">0</div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <!-- Grafik-grafik -->
                    <div class="col-md-6">
                        <div class="card p-4">
                            <h6 class="fw-bold text-muted mb-3">Statistik Agama Murid</h6>
                            <canvas id="chartAgama"></canvas>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card p-4">
                            <h6 class="fw-bold text-muted mb-3">Pekerjaan Wali Murid</h6>
                            <canvas id="chartKerja"></canvas>
                        </div>
                    </div>
                    <div class="col-md-12">
                        <div class="card p-4">
                            <h6 class="fw-bold text-muted mb-3">Inventaris Sekolah (Baru 5 Data)</h6>
                            <div class="table-responsive">
                                <table class="table table-sm">
                                    <thead class="table-light"><tr><th>Nama Barang</th><th>Jumlah</th><th>Kondisi</th></tr></thead>
                                    <tbody id="tabelInventaris"><tr><td colspan="3" class="text-center">Memuat...</td></tr></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbweLDASRb8-AbSrlD83kE3GsWBuQdPB0W0uqTW9BMBxrCsCtugADV0O9DFSQjhL0wwPIw/exec";

        window.onload = async () => {
            const sess = JSON.parse(localStorage.getItem('session_sdnrt'));
            if (!sess || sess.role !== 'admin') window.location.href = 'index.html';
            document.getElementById('adminName').innerText = sess.user;

            // 1. Ambil Statistik
            try {
                const resStats = await fetch(`${API_URL}?action=getStats`);
                const s = await resStats.json();
                
                if(s.status === "success") {
                    renderCharts(s.stats);
                } else {
                    console.log("Stats masih kosong");
                }
            } catch(e) {}

            // 2. Ambil Inventaris
            try {
                const resInv = await fetch(`${API_URL}?action=getInventaris`);
                const inv = await resInv.json();
                let html = "";
                if(inv.status === "success") {
                    inv.data.slice(0, 5).forEach(item => {
                        html += `<tr><td>${item.nama_barang || '-'}</td><td>${item.jumlah || '-'}</td><td>${item.kondisi || '-'}</td></tr>`;
                    });
                    document.getElementById('tabelInventaris').innerHTML = html;
                } else {
                    document.getElementById('tabelInventaris').innerHTML = "<tr><td colspan='3' class='text-center'>Data inventaris kosong</td></tr>";
                }
            } catch(e) {}
        };

        function renderCharts(data) {
            new Chart(document.getElementById('chartAgama'), { 
                type: 'pie', 
                data: { labels: Object.keys(data.agama), datasets: [{ data: Object.values(data.agama), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'] }] } 
            });
            new Chart(document.getElementById('chartKerja'), { 
                type: 'bar', 
                data: { labels: Object.keys(data.pekerjaanAyah), datasets: [{ label: 'Jumlah', data: Object.values(data.pekerjaanAyah), backgroundColor: '#6366f1' }] } 
            });
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
