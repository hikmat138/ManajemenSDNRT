<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel Pro - SDN RANCA TALES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-dark: #0f172a; --accent: #3b82f6; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; font-size: 0.85rem; }
        
        /* Sidebar Toggle Logic */
        #sidebar { width: 250px; height: 100vh; position: fixed; background: var(--primary-dark); color: white; transition: 0.3s; z-index: 1000; }
        #sidebar.active { margin-left: -250px; }
        #content { width: calc(100% - 250px); margin-left: 250px; transition: 0.3s; min-height: 100vh; }
        #content.active { width: 100%; margin-left: 0; }

        /* Professional Table Styling */
        .table-container { background: white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); overflow: hidden; }
        .table-responsive { max-height: 700px; overflow-y: auto; }
        
        /* Mengunci Kolom Nama agar tidak hilang saat scroll kanan */
        .sticky-col { position: sticky; left: 0; background-color: white !important; z-index: 2; border-right: 2px solid #dee2e6 !important; }
        .table dark thead th.sticky-col { background-color: #212529 !important; z-index: 3; }

        .nav-link { color: #94a3b8; padding: 12px 20px; border-left: 4px solid transparent; }
        .nav-link.active { background: #1e293b; color: white; border-left-color: var(--accent); }
        .form-control-sm, .form-select-sm { border-radius: 6px; }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <nav id="sidebar">
        <div class="p-4 text-center border-bottom border-secondary">
            <h5 class="fw-bold mb-0">HKMT OFFICIAL</h5>
            <small class="text-muted text-uppercase">SDN Ranca Tales</small>
        </div>
        <div class="py-3">
            <a href="#" class="nav-link active" onclick="switchTab('siswa')"><i class="fa fa-user-graduate me-2"></i> Data Murid</a>
            <a href="#" class="nav-link" onclick="switchTab('guru')"><i class="fa fa-chalkboard-teacher me-2"></i> Data Guru</a>
            <a href="#" class="nav-link text-danger mt-5" onclick="logout()"><i class="fa fa-power-off me-2"></i> Keluar</a>
        </div>
    </nav>

    <!-- CONTENT -->
    <div id="content">
        <nav class="navbar navbar-white bg-white border-bottom px-4 py-3 shadow-sm">
            <button class="btn btn-sm btn-dark" id="btnToggle"><i class="fa fa-bars"></i></button>
            <span class="fw-bold text-uppercase ms-3">Manajemen Data Digital</span>
            <div class="ms-auto fw-bold text-primary">Pa Hikmat, S. Pd., Gr.</div>
        </nav>

        <div class="p-4">
            <!-- FILTER & TOOLS -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-2">
                            <label class="small text-muted">Tampilkan</label>
                            <select id="pageSize" class="form-select form-select-sm" onchange="loadData()">
                                <option value="10">10 Baris</option>
                                <option value="50">50 Baris</option>
                                <option value="100">100 Baris</option>
                                <option value="all">Semua</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="small text-muted">Filter Rombel</label>
                            <select id="filterKelas" class="form-select form-select-sm" onchange="loadData()">
                                <option value="">Semua Kelas</option>
                                <option value="1">Kelas 1</option>
                                <option value="2">Kelas 2</option>
                                <option value="3">Kelas 3</option> <!-- Kelas Binaan Pa Hikmat -->
                                <option value="4">Kelas 4</option>
                                <option value="5">Kelas 5</option>
                                <option value="6">Kelas 6</option>
                            </select>
                        </div>
                        <div class="col-md-5">
                            <label class="small text-muted">Cari Nama Murid</label>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text bg-white"><i class="fa fa-search"></i></span>
                                <input type="text" id="searchName" class="form-control" placeholder="Ketik nama murid..." onkeyup="loadData()">
                            </div>
                        </div>
                        <div class="col-md-3 d-flex align-items-end justify-content-end">
                            <button class="btn btn-primary btn-sm me-2" onclick="openModalTambah()"><i class="fa fa-plus me-1"></i> Tambah</button>
                            <button class="btn btn-success btn-sm" onclick="exportExcel()"><i class="fa fa-file-excel me-1"></i> Export</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- DATA TABLE -->
            <div class="table-container">
                <div class="table-responsive">
                    <table class="table table-sm table-hover mb-0 align-middle">
                        <thead class="table-dark">
                            <tr id="tableHeader">
                                <!-- Kolom akan di-render otomatis oleh JS agar sesuai sheet -->
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="10" class="text-center py-5">Menghubungkan ke database SDN Ranca Tales...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbweLDASRb8-AbSrlD83kE3GsWBuQdPB0W0uqTW9BMBxrCsCtugADV0O9DFSQjhL0wwPIw/exec";
        let rawData = [];

        // Toggle Sidebar
        document.getElementById('btnToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('content').classList.toggle('active');
        });

        // Load Data dari Apps Script
        async function loadData() {
            try {
                const response = await fetch(`${API_URL}?action=getStats`); // Menarik data siswa
                const result = await response.json();
                
                if (result.status === "success") {
                    rawData = result.data || [];
                    renderTable();
                }
            } catch (err) {
                console.error("Gagal sinkronisasi data.");
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const thead = document.getElementById('tableHeader');
            const search = document.getElementById('searchName').value.toLowerCase();
            const kelas = document.getElementById('filterKelas').value;
            const size = document.getElementById('pageSize').value;

            // 1. Definisikan Header (Hanya tampilkan beberapa kolom utama + Sisanya scroll)
            const headers = ["Aksi", "Nama Lengkap", "NISN", "JK", "Tempat Lahir", "Tgl Lahir", "NIK", "Agama", "Alamat", "Rombel", "Status"];
            thead.innerHTML = headers.map((h, i) => `<th class="${i === 1 ? 'sticky-col' : ''} text-nowrap p-3">${h}</th>`).join('');

            // 2. Filter Data
            let filtered = rawData.filter(d => 
                (d.nama.toLowerCase().includes(search)) && 
                (kelas === "" || d.rombel.toString() === kelas)
            );

            // 3. Pagination
            let limit = size === 'all' ? filtered.length : parseInt(size);
            let displayData = filtered.slice(0, limit);

            // 4. Render Rows
            tbody.innerHTML = displayData.map(d => `
                <tr>
                    <td class="text-center">
                        <div class="btn-group">
                            <button class="btn btn-xs btn-outline-primary" onclick="editData('${d.nisn}')"><i class="fa fa-edit"></i></button>
                            <button class="btn btn-xs btn-outline-danger" onclick="hapusData('${d.nisn}')"><i class="fa fa-trash"></i></button>
                        </div>
                    </td>
                    <td class="sticky-col fw-bold text-primary">${d.nama}</td>
                    <td>${d.nisn}</td>
                    <td>${d.jk}</td>
                    <td>${d.tmp_lahir}</td>
                    <td>${d.tgl_lahir}</td>
                    <td>${d.nik}</td>
                    <td>${d.agama}</td>
                    <td class="text-nowrap">${d.alamat}</td>
                    <td><span class="badge bg-info text-dark">${d.rombel}</span></td>
                    <td><span class="badge bg-success">Aktif</span></td>
                </tr>
            `).join('');

            if(displayData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${headers.length}" class="text-center py-5 text-muted">Data murid tidak ditemukan.</td></tr>`;
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
