<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANAJEMEN KELAS - SDN RANCA TALES</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --primary: #1e293b; --accent: #3b82f6; }
    body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
    
    /* LAYAR LOGIN (Full Screen) */
    #login-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      z-index: 2000; display: flex; align-items: center; justify-content: center;
    }

    /* APLIKASI UTAMA (Hidden by default) */
    #main-app { display: none; } 
    
    #sidebar { width: 260px; height: 100vh; position: fixed; background: var(--primary); color: white; z-index: 1000; }
    #content { margin-left: 260px; padding: 20px; min-height: 100vh; }
    
    .nav-link { color: #94a3b8; padding: 12px 20px; border-radius: 8px; margin: 4px 15px; cursor: pointer; }
    .nav-link.active, .nav-link:hover { background: var(--accent); color: white; }
    .hidden { display: none !important; }

    @media (max-width: 768px) {
      #sidebar { margin-left: -260px; transition: 0.3s; }
      #sidebar.active { margin-left: 0; }
      #content { margin-left: 0; }
    }
  </style>
</head>
<body>

  <!-- 1. LAYAR LOGIN -->
  <div id="login-screen">
    <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px; border-radius: 15px;">
      <div class="card-body p-5 text-center">
        <h4 class="fw-bold mb-2">MANAJEMEN KELAS</h4>
        <p class="text-muted small mb-4">SDN RANCA TALES - HKMT OFFICIAL</p>
        
        <div class="text-start">
          <label class="small fw-bold">Username</label>
          <input type="text" id="user" class="form-control mb-3" placeholder="Masukkan username">
          
          <label class="small fw-bold">Password</label>
          <input type="password" id="pass" class="form-control mb-4" placeholder="Masukkan password">
          
          <button id="btn-login" class="btn btn-primary w-100 py-2 fw-bold" onclick="prosesLogin()">
            MASUK KE SISTEM
          </button>
        </div>
        <div id="login-msg" class="text-danger mt-3 small"></div>
      </div>
    </div>
  </div>

  <!-- 2. APLIKASI UTAMA -->
  <div id="main-app">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="p-4 text-center border-bottom border-secondary">
        <h6 class="fw-bold mb-0">MANAJEMEN KELAS</h6>
        <span id="role-badge" class="badge bg-info mt-2" style="font-size: 10px;"></span>
      </div>
      <div class="mt-3">
        <div class="nav-link active" onclick="nav('dash')">📊 Dashboard</div>
        <div class="nav-link" onclick="nav('siswa')">👥 Data Murid</div>
        <div class="nav-link" onclick="nav('mutasi')">🔄 Mutasi & Cohort</div>
        <div id="menu-admin" class="hidden">
          <div class="nav-link" onclick="nav('guru')">👨‍🏫 Data Guru</div>
          <div class="nav-link" onclick="nav('inv')">📦 Inventaris Kelas</div>
        </div>
        <hr class="mx-3 opacity-25">
        <div class="nav-link text-danger" onclick="location.reload()">🚪 Keluar</div>
      </div>
    </div>

    <!-- Main Content -->
    <div id="content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <button class="btn btn-dark d-md-none" onclick="document.getElementById('sidebar').classList.toggle('active')">☰</button>
        <h5 class="fw-bold mb-0">Halo, <span id="display-name">User</span>!</h5>
      </div>

      <!-- Dashboard Section -->
      <div id="sec-dash" class="section">
        <div class="row g-4">
          <div class="col-md-6"><div class="card p-4"><h6>Agama</h6><canvas id="chartAgama"></canvas></div></div>
          <div class="col-md-6"><div class="card p-4"><h6>Pekerjaan Orang Tua</h6><canvas id="chartKerja"></canvas></div></div>
          <div class="col-md-6"><div class="card p-4"><h6>Ekonomi Ortu</h6><canvas id="chartGaji"></canvas></div></div>
          <div class="col-md-6"><div class="card p-4"><h6>Sebaran Umur</h6><canvas id="chartUmur"></canvas></div></div>
        </div>
      </div>

      <!-- Section lainnya (Siswa, Mutasi, dll) di sini -->
    </div>
  </div>

  <script>
    let currentUser = {};

    function prosesLogin() {
      const u = document.getElementById('user').value;
      const p = document.getElementById('pass').value;
      const btn = document.getElementById('btn-login');
      const msg = document.getElementById('login-msg');

      btn.disabled = true;
      btn.innerText = "Mengecek Akun...";

      google.script.run.withSuccessHandler(res => {
        if (res.success) {
          currentUser = res;
          
          // 1. Sembunyikan Login, Munculkan App
          document.getElementById('login-screen').classList.add('hidden');
          document.getElementById('main-app').style.display = 'block';
          
          // 2. Set Informasi User
          document.getElementById('display-name').innerText = res.user;
          document.getElementById('role-badge').innerText = res.role.toUpperCase();
          
          // 3. Cek Role Admin
          if (res.role === 'admin') {
            document.getElementById('menu-admin').classList.remove('hidden');
          }

          // 4. Load Data Awal
          loadDashboard();
        } else {
          msg.innerText = "Username atau password salah!";
          btn.disabled = false;
          btn.innerText = "MASUK KE SISTEM";
        }
      }).checkLogin(u, p);
    }

    function nav(page) {
      document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
      document.getElementById('sec-' + page)?.classList.remove('hidden');
      
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      event.target.classList.add('active');
    }

    function loadDashboard() {
      google.script.run.withSuccessHandler(stats => {
        // Render grafik menggunakan Chart.js (sama seperti sebelumnya)
        renderChart('chartAgama', 'pie', stats.agama);
        renderChart('chartKerja', 'bar', stats.pekerjaanAyah, true);
        renderChart('chartGaji', 'doughnut', stats.penghasilan);
        renderChart('chartUmur', 'bar', stats.umur);
      }).getDetailedStats();
    }

    function renderChart(id, type, dataObj, horizontal = false) {
      const ctx = document.getElementById(id).getContext('2d');
      new Chart(ctx, {
        type: type,
        data: {
          labels: Object.keys(dataObj),
          datasets: [{
            data: Object.values(dataObj),
            backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
          }]
        },
        options: { indexAxis: horizontal ? 'y' : 'x', responsive: true }
      });
    }
  </script>
</body>
</html>
