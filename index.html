<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SDN RANCA TALES</title>
    <!-- Library CSS & Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --airbnb-coral: #FF385C;
            --airbnb-dark: #222222;
            --airbnb-gray: #717171;
            --airbnb-border: #DDDDDD;
        }

        body { 
            background: #FFFFFF; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Inter', sans-serif; 
            color: var(--airbnb-dark);
            margin: 0;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 24px;
        }

        .login-card { 
            background: #FFFFFF; 
            padding: 3rem; 
            border-radius: 20px; 
            box-shadow: rgba(0, 0, 0, 0.08) 0px 8px 28px;
            border: 1px solid var(--airbnb-border); 
        }

        .brand-title {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.8px;
            color: var(--airbnb-coral);
            margin-bottom: 4px;
        }

        .brand-subtitle {
            color: var(--airbnb-gray);
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
            font-weight: 400;
        }

        /* Label & Input Styling */
        .form-group-custom { margin-bottom: 1.5rem; text-align: left; }
        
        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; }

        .form-control { 
            width: 100%;
            border: 1px solid #B0B0B0; 
            border-radius: 12px; 
            padding: 14px 16px; 
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .form-control:focus { 
            border-color: var(--airbnb-dark);
            box-shadow: none; 
            outline: 2px solid var(--airbnb-dark);
            outline-offset: -2px;
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 16px;
            cursor: pointer;
            color: var(--airbnb-gray);
            font-size: 1.1rem;
            z-index: 10;
            background: none;
            border: none;
            padding: 0;
        }

        .password-toggle:hover { color: var(--airbnb-dark); }

        /* Button Airbnb Style */
        .btn-primary { 
            background: linear-gradient(to right, #E31C5F 0%, #D70466 100%);
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: 600; 
            color: white;
            transition: opacity 0.2s ease;
            margin-top: 10px;
        }

        .btn-primary:hover { opacity: 0.9; color: white; }
        .btn-primary:active { transform: scale(0.98); }

        /* SweetAlert2 Theme Airbnb */
        .swal2-popup { border-radius: 24px !important; font-family: 'Inter', sans-serif !important; }
        .swal2-confirm { 
            background-color: var(--airbnb-dark) !important; 
            border-radius: 12px !important; 
            padding: 12px 32px !important; 
        }

        .footer-text { margin-top: 2rem; color: var(--airbnb-gray); font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card text-center">
            <h3 class="brand-title">SDN RANCA TALES</h3>
            <p class="brand-subtitle">Digitalisasi Manajemen Sekolah</p>
            
            <!-- Input Username -->
            <div class="form-group-custom">
                <label class="form-label">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" class="form-control" placeholder="ID Murid / NUPTK">
                </div>
            </div>
            
            <!-- Input Password -->
            <div class="form-group-custom">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="Kata sandi anda">
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i id="toggleIcon" class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <button id="btnLogin" onclick="prosesLogin()" class="btn btn-primary w-100">Lanjutkan</button>
            
            <p class="footer-text">
                &copy; 2026 SDN Ranca Tales — Serang, Banten
            </p>
        </div>
    </div>

    <script>
        // API URL sesuai deployment Apps Script Pa Hikmat
        const API_URL = "https://script.google.com/macros/s/AKfycbweLDASRb8-AbSrlD83kE3GsWBuQdPB0W0uqTW9BMBxrCsCtugADV0O9DFSQjhL0wwPIw/exec";

        // Fitur Lihat/Sembunyi Password
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        async function prosesLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            if (!u || !p) {
                return Swal.fire({ 
                    icon: 'warning', 
                    title: 'Data Belum Lengkap', 
                    text: 'Username dan password wajib diisi.',
                    confirmButtonColor: '#222222'
                });
            }

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Memverifikasi...`;

            try {
                // Melakukan request ke Google Apps Script
                const resp = await fetch(`${API_URL}?action=login&u=${u}&p=${p}`);
                const res = await resp.json();

                if (res.success) {
                    localStorage.setItem('session_sdnrt', JSON.stringify(res));
                    Swal.fire({ 
                        icon: 'success', 
                        title: 'Akses Berhasil', 
                        text: 'Selamat datang, ' + res.user, 
                        timer: 1500, 
                        showConfirmButton: false 
                    }).then(() => {
                        window.location.href = res.role === 'admin' ? 'admin.html' : 'kelas.html';
                    });
                } else {
                    Swal.fire({ 
                        icon: 'error', 
                        title: 'Gagal Masuk', 
                        text: res.message || 'Username atau password salah.',
                        confirmButtonColor: '#FF385C'
                    });
                }
            } catch (e) {
                Swal.fire({ 
                    icon: 'error', 
                    title: 'Kesalahan Sistem', 
                    text: 'Gagal terhubung ke database. Cek koneksi internet.',
                    confirmButtonColor: '#222222'
                });
            } finally {
                btn.disabled = false;
                btn.innerText = "Lanjutkan";
            }
        }
    </script>
</body>
</html>
