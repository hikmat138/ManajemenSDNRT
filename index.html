<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SDN RANCA TALES</title>
    <!-- Library CSS & Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --brand-blue: #0066FF; 
            --brand-blue-dark: #0052CC;
            --dark-text: #222222;
            --gray-text: #717171;
            --border-color: #DDDDDD;
        }

        body { 
            background: #F8FAFC; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Inter', sans-serif; 
            color: var(--dark-text);
            margin: 0;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 24px;
        }

        .login-card { 
            background: #FFFFFF; 
            padding: 2.5rem; 
            border-radius: 24px; 
            box-shadow: rgba(0, 0, 0, 0.08) 0px 15px 35px;
            border: 1px solid var(--border-color); 
        }

        .brand-title {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            color: var(--brand-blue);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .brand-subtitle {
            color: var(--gray-text);
            font-size: 0.85rem;
            margin-bottom: 2rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .form-group-custom { margin-bottom: 1.25rem; text-align: left; }
        
        .form-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
            color: #555;
        }

        .input-wrapper { position: relative; }

        .form-control { 
            width: 100%;
            border: 1.5px solid #E2E8F0; 
            border-radius: 12px; 
            padding: 12px 16px; 
            font-size: 0.95rem;
            transition: all 0.2s ease;
            background-color: #FDFDFD;
        }

        .form-control:focus { 
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.1); 
            background-color: #fff;
            outline: none;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94A3B8;
            border: none;
            background: none;
            padding: 5px;
            z-index: 5;
        }

        .btn-primary { 
            background: var(--brand-blue);
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover { 
            background: var(--brand-blue-dark); 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 102, 255, 0.3);
        }

        .footer-text { margin-top: 2rem; color: #94A3B8; font-size: 0.7rem; font-weight: 500; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card text-center">
            <h3 class="brand-title">MANAJEMAN KELAS</h3>
            <p class="brand-subtitle">SDN RANCA TALES</p>
            
            <div class="form-group-custom">
                <label class="form-label">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" class="form-control" placeholder="Username Anda" autocomplete="username">
                </div>
            </div>
            
            <div class="form-group-custom">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password">
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i id="toggleIcon" class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <button id="btnLogin" onclick="prosesLogin()" class="btn btn-primary w-100 uppercase">MASUK APLIKASI</button>
            
            <p class="footer-text uppercase tracking-widest">
                &copy; 2026 SDN Ranca Tales — Serang, Banten
            </p>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbweLDASRb8-AbSrlD83kE3GsWBuQdPB0W0uqTW9BMBxrCsCtugADV0O9DFSQjhL0wwPIw/exec";

        function togglePassword() {
            const p = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (p.type === 'password') {
                p.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                p.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        async function prosesLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const btn = document.getElementById('btnLogin');

            if (!u || !p) {
                return Swal.fire({ 
                    icon: 'warning', 
                    title: 'Data Kurang', 
                    text: 'Silakan isi username dan password.',
                    confirmButtonColor: '#0066FF'
                });
            }

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status"></span> MEMVERIFIKASI...`;

            try {
                // Menambahkan timestamp agar browser tidak melakukan caching pada request
                const resp = await fetch(`${API_URL}?action=login&u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}&ts=${Date.now()}`);
                const res = await resp.json();

                if (res.success) {
                    // Perbaikan: Ambil nama dari 'res.user' atau 'res.nama' atau fallback ke username
                    const namaTampil = res.user || res.nama || u; 
                    
                    localStorage.setItem('session_sdnrt', JSON.stringify(res));

                    Swal.fire({ 
                        icon: 'success', 
                        title: 'Berhasil Masuk', 
                        text: 'Selamat datang, ' + namaTampil.toUpperCase(), 
                        timer: 2000, 
                        showConfirmButton: false,
                        position: 'center'
                    }).then(() => {
                        // Redirect berdasarkan role
                        window.location.href = res.role === 'admin' ? 'admin.html' : 'kelas.html';
                    });
                } else {
                    Swal.fire({ 
                        icon: 'error', 
                        title: 'Akses Ditolak', 
                        text: res.message || 'Username atau password salah.',
                        confirmButtonColor: '#0066FF'
                    });
                }
            } catch (e) {
                console.error("Login Error:", e);
                Swal.fire({ 
                    icon: 'error', 
                    title: 'Gangguan Sistem', 
                    text: 'Tidak dapat terhubung ke server. Pastikan koneksi internet aktif.',
                    confirmButtonColor: '#0066FF'
                });
            } finally {
                btn.disabled = false;
                btn.innerText = "MASUK APLIKASI";
            }
        }

        // Fitur Enter untuk Login
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                prosesLogin();
            }
        });
    </script>
</body>
</html>
