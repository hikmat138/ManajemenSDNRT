<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
    .card { width: 100%; max-width: 400px; border-radius: 20px; border: none; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
    .btn-primary { background: #3b82f6; border: none; padding: 12px; border-radius: 12px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card p-5 text-center">
    <h3 class="fw-bold mb-1 text-dark">SDN RANCA TALES</h3>
    <p class="text-muted small mb-4">MANAJEMEN KELAS</p>
    
    <div class="text-start mb-3">
      <label class="small fw-bold mb-1">Username</label>
      <input type="text" id="u" class="form-control" placeholder="Masukkan username">
    </div>
    <div class="text-start mb-4">
      <label class="small fw-bold mb-1">Password</label>
      <input type="password" id="p" class="form-control" placeholder="Masukkan password">
    </div>
    
    <button class="btn btn-primary w-100" id="btnLogin" onclick="login()">MASUK</button>
  </div>

  <script>
    function login() {
      const u = document.getElementById('u').value;
      const p = document.getElementById('p').value;
      const btn = document.getElementById('btnLogin');

      if(!u || !p) {
        Swal.fire('Oops!', 'Username dan password harus diisi', 'warning');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Menghubungkan...';

      google.script.run.withSuccessHandler(res => {
        if(res.success) {
          localStorage.setItem('userSession', JSON.stringify(res));
          Swal.fire({ icon:'success', title:'Login Berhasil', text:'Selamat datang, ' + res.user, timer:1500, showConfirmButton:false }).then(() => {
            window.top.location.href = "<?= ScriptApp.getService().getUrl(); ?>?p=" + (res.role === 'admin' ? 'admin' : 'kelas');
          });
        } else {
          btn.disabled = false;
          btn.innerHTML = 'MASUK';
          Swal.fire('Gagal', 'Akun tidak ditemukan atau salah!', 'error');
        }
      }).checkLogin(u, p);
    }
  </script>
</body>
</html>
