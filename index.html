<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap & SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    body { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
    .card { width: 100%; max-width: 400px; border: none; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    .btn-primary { border-radius: 10px; padding: 12px; font-weight: bold; background: #3b82f6; }
  </style>
</head>
<body>

  <div class="card p-4">
    <div class="text-center mb-4">
      <h3 class="fw-bold text-dark">SDN RANCA TALES</h3>
      <p class="text-muted">Digitalisasi SDN Ranca Tales</p>
    </div>
    
    <div class="mb-3">
      <label class="form-label small fw-bold">Username</label>
      <input type="text" id="u" class="form-control" placeholder="Nama pengguna">
    </div>
    <div class="mb-4">
      <label class="form-label small fw-bold">Password</label>
      <input type="password" id="p" class="form-control" placeholder="Kata sandi">
    </div>
    
    <button class="btn btn-primary w-100" id="btnLogin" onclick="login()">MASUK</button>
  </div>

  <script>
    function login() {
      const user = document.getElementById('u').value;
      const pass = document.getElementById('p').value;
      const btn = document.getElementById('btnLogin');

      if (!user || !pass) {
        Swal.fire('Oops!', 'Username dan Password wajib diisi', 'warning');
        return;
      }

      // Animasi Loading
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Menghubungkan...';

      google.script.run.withSuccessHandler(res => {
        btn.disabled = false;
        btn.innerHTML = 'MASUK';

        if (res.success) {
          Swal.fire({
            title: 'Berhasil!',
            text: 'Selamat Datang, ' + res.user,
            icon: 'success',
            timer: 1500,
            showConfirmButton: false
          }).then(() => {
            // Arahkan halaman sesuai role
            const url = "<?= ScriptApp.getService().getUrl(); ?>";
            window.top.location.href = url + "?p=" + (res.role === 'admin' ? 'admin' : 'kelas');
          });
        } else {
          Swal.fire('Gagal Login', 'Username atau Password salah!', 'error');
        }
      }).checkLogin(user, pass);
    }
  </script>
</body>
</html>
