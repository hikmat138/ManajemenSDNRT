<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SDN RANCA TALES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #0f172a; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        .login-card { width: 100%; max-width: 400px; background: #1e293b; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .form-control { background: #0f172a; border: 1px solid #334155; color: white; border-radius: 0.75rem; padding: 0.75rem; }
        .form-control:focus { background: #0f172a; color: white; border-color: #3b82f6; box-shadow: none; }
        .btn-primary { background: #3b82f6; border: none; padding: 0.75rem; border-radius: 0.75rem; font-weight: 600; transition: 0.3s; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h3 class="fw-bold mb-1">SDN RANCA TALES</h3>
        <p class="text-muted small mb-4">Digitalisasi Manajemen Sekolah</p>
        
        <div class="text-start mb-3">
            <label class="small fw-semibold mb-1">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Masukkan username">
        </div>
        <div class="text-start mb-4">
            <label class="small fw-semibold mb-1">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Masukkan password">
        </div>
        
        <button id="btnLogin" onclick="prosesLogin()" class="btn btn-primary w-100">MASUK KE SISTEM</button>
        <p class="mt-4 mb-0 text-muted" style="font-size: 0.7rem;">&copy; 2026 SDN Ranca Tales - Serang, Banten</p>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbweLDASRb8-AbSrlD83kE3GsWBuQdPB0W0uqTW9BMBxrCsCtugADV0O9DFSQjhL0wwPIw/exec";

        async function prosesLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            if (!u || !p) {
                return Swal.fire({ icon: 'warning', title: 'Perhatian', text: 'Silakan isi username dan password!', background: '#1e293b', color: '#fff' });
            }

            btn.disabled = true;
            btn.innerText = "Memverifikasi...";

            try {
                const resp = await fetch(`${API_URL}?action=login&u=${u}&p=${p}`);
                const res = await resp.json();

                if (res.success) {
                    localStorage.setItem('session_sdnrt', JSON.stringify(res));
                    Swal.fire({ icon: 'success', title: 'Login Berhasil', text: 'Selamat datang, ' + res.user, timer: 1500, showConfirmButton: false, background: '#1e293b', color: '#fff' }).then(() => {
                        window.location.href = res.role === 'admin' ? 'admin.html' : 'kelas.html';
                    });
                } else {
                    Swal.fire({ icon: 'error', title: 'Gagal', text: res.message || 'Akun tidak ditemukan!', background: '#1e293b', color: '#fff' });
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'Koneksi Error', text: 'Gagal menghubungi server Apps Script.', background: '#1e293b', color: '#fff' });
            } finally {
                btn.disabled = false;
                btn.innerText = "MASUK KE SISTEM";
            }
        }
    </script>
</body>
</html>
