<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1e293b; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { width: 100%; max-width: 400px; border-radius: 15px; }
  </style>
</head>
<body>
  <div class="card shadow-lg p-4">
    <div class="text-center mb-4">
      <h4 class="fw-bold">SDN RANCA TALES</h4>
      <small class="text-muted">Sistem Digitalisasi Sekolah</small>
    </div>
    <div id="login-form">
      <input type="text" id="u" class="form-control mb-2" placeholder="Username">
      <input type="password" id="p" class="form-control mb-3" placeholder="Password">
      <button class="btn btn-primary w-100" onclick="login()">MASUK</button>
      <div id="msg" class="text-danger mt-2 small text-center"></div>
    </div>
  </div>

  <script>
    function login() {
      const u = document.getElementById('u').value;
      const p = document.getElementById('p').value;
      google.script.run.withSuccessHandler(res => {
        if(res.success) {
          // Pindah halaman berdasarkan role
          if(res.role === 'admin') {
            window.top.location.href = "<?= ScriptApp.getService().getUrl(); ?>?p=admin";
          } else {
            window.top.location.href = "<?= ScriptApp.getService().getUrl(); ?>?p=kelas";
          }
        } else {
          document.getElementById('msg').innerText = "Akun tidak ditemukan!";
        }
      }).checkLogin(u, p);
    }
  </script>
</body>
</html>
